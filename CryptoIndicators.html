<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>◆ CONFLUENCE DECK v5 — LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-0:#0A0908;--bg-1:#0E0D0A;--bg-2:#12110E;--bg-3:#1A1810;--border-1:#2A2618;--border-2:#3A3520;--gold:#C8A84E;--gold-dim:#6B6040;--text:#E8DFC0;--text-dim:#8A8060;--green:#7BC86C;--red:#E8734A;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg-0);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100dvh;overscroll-behavior:none;background-image:linear-gradient(rgba(200,168,78,0.01) 1px,transparent 1px),linear-gradient(90deg,rgba(200,168,78,0.01) 1px,transparent 1px);background-size:32px 32px;}
.header{position:sticky;top:0;z-index:100;background:var(--bg-1);border-bottom:1px solid var(--border-1);padding:10px 12px;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;}
.hdr-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hdr-logo{font-size:8px;letter-spacing:0.2em;color:var(--gold);font-weight:700;}
.hdr-coin{font-size:15px;font-weight:500;}.hdr-price{font-size:15px;font-weight:700;}
.hdr-chg{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;}
.hdr-live{font-size:7px;color:#26A65B;letter-spacing:0.1em;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.tf-tabs{display:flex;gap:2px;}
.tf-tab{padding:6px 12px;cursor:pointer;border:1px solid var(--border-1);background:var(--bg-2);color:var(--text-dim);font-size:11px;font-family:inherit;border-radius:3px;min-width:38px;text-align:center;}
.tf-tab.active{background:var(--border-2);color:var(--gold);border-color:var(--gold-dim);}
.coin-strip-wrap{background:var(--bg-1);border-bottom:1px solid var(--border-1);}
.coin-strip{display:flex;gap:3px;overflow-x:auto;padding:8px 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.coin-strip::-webkit-scrollbar{display:none;}
.coin-chip{flex-shrink:0;padding:8px 12px;background:var(--bg-2);border:1px solid var(--border-1);border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px;}
.coin-chip.active{background:var(--bg-3);border-color:var(--gold-dim);box-shadow:0 0 10px rgba(200,168,78,0.08);}
.chip-sym{font-size:11px;font-weight:700;white-space:nowrap;}.chip-pct{font-size:9px;font-weight:600;}
.content{padding:8px;display:flex;flex-direction:column;gap:10px;padding-bottom:40px;}
.panel{background:var(--bg-2);border:1px solid var(--border-1);padding:12px;border-radius:3px;}
.p-title{font-size:9px;letter-spacing:0.14em;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border-1);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
.p-title-r{font-size:12px;font-weight:700;}
.view-tog{display:flex;gap:2px;}
.vt-btn{padding:3px 8px;font-size:8px;font-family:inherit;cursor:pointer;border:1px solid var(--border-1);background:var(--bg-3);color:var(--text-dim);border-radius:2px;letter-spacing:0.05em;}
.vt-btn.active{background:var(--gold-dim);color:var(--bg-0);border-color:var(--gold);}
.interp{margin-top:8px;padding:8px 10px;background:rgba(200,168,78,0.04);border-left:2px solid var(--gold-dim);border-radius:0 3px 3px 0;font-size:10px;line-height:1.55;}
.interp-label{font-size:8px;letter-spacing:0.12em;color:var(--gold);margin-bottom:4px;font-weight:600;}
.interp-bias{font-weight:700;padding:1px 5px;border-radius:2px;font-size:10px;display:inline-block;margin-bottom:3px;}
.interp-bias.long{color:var(--green);background:rgba(123,200,108,0.1);}
.interp-bias.short{color:var(--red);background:rgba(232,115,74,0.1);}
.interp-bias.neutral{color:var(--text-dim);background:rgba(138,128,96,0.1);}
.interp-body{color:var(--text-dim);font-size:10px;line-height:1.6;}
.chart-wrap{position:relative;width:100%;}.chart-wrap canvas{display:block;width:100%;}
.legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.legend-item{display:flex;align-items:center;gap:3px;font-size:7px;color:var(--text-dim);}
.lg-line{width:10px;height:2px;border-radius:1px;}.lg-dash{width:10px;height:0;border-top:2px dashed;}
.cs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px;}
.cs-cell{background:var(--bg-3);border:1px solid var(--border-1);padding:8px 4px;text-align:center;border-radius:3px;display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:border-color 0.15s;}
.cs-cell:hover{border-color:var(--gold-dim);}
.cs-lbl{font-size:7px;color:var(--gold-dim);letter-spacing:0.08em;}.cs-arr{font-size:16px;font-weight:700;line-height:1;}.cs-raw{font-size:8px;color:var(--text-dim);}
.cs-bar{height:3px;background:var(--bg-1);border-radius:2px;overflow:hidden;margin-top:1px;}.cs-bar-f{height:100%;border-radius:2px;}
.sig-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg-3);border:1px solid var(--border-1);border-radius:3px;}
.sig-lbl{font-size:9px;color:var(--gold-dim);}.sig-val{font-size:12px;font-weight:700;}
.s-l{color:var(--green);}.s-s{color:var(--red);}.s-n{color:var(--text-dim);}
.c2-row{display:grid;grid-template-columns:78px 1fr 42px;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(42,38,24,0.2);cursor:pointer;}
.c2-row:hover{background:rgba(200,168,78,0.03);}
.c2-lbl{font-size:8px;color:var(--text-dim);}.c2-bg{height:7px;background:var(--bg-1);border-radius:3px;overflow:hidden;}
.c2-fill{height:100%;border-radius:3px;}.c2-val{font-size:9px;font-weight:600;text-align:right;}
.ind-chart-area canvas{display:block;width:100%;}
.factor-tip{display:none;position:fixed;z-index:200;background:var(--bg-1);border:1px solid var(--gold-dim);border-radius:4px;padding:12px 14px;max-width:320px;width:calc(100vw - 32px);box-shadow:0 8px 32px rgba(0,0,0,0.6);font-size:10px;line-height:1.6;}
.factor-tip.show{display:block;}.ft-title{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.ft-close{cursor:pointer;color:var(--text-dim);font-size:14px;padding:2px 6px;}.ft-desc{color:var(--text);margin-bottom:6px;}.ft-how{color:var(--text-dim);}
.ft-how b{color:var(--text);font-weight:600;}
.tip-backdrop{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:199;background:rgba(0,0,0,0.3);}
.tip-backdrop.show{display:block;}
.loading{text-align:center;padding:40px 20px;color:var(--gold-dim);font-size:10px;letter-spacing:0.1em;}
.loading::after{content:'';display:inline-block;width:12px;height:12px;border:2px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-left:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.panels-2col{display:flex;flex-direction:column;gap:8px;}
@media(min-width:768px){.panels-2col{flex-direction:row;}.panels-2col>.panel{flex:1;min-width:0;}}
@media(max-width:360px){.cs-grid{grid-template-columns:repeat(3,1fr);}.c2-row{grid-template-columns:68px 1fr 36px;}}
.footer{text-align:center;font-size:7px;color:var(--border-2);padding:16px 8px 24px;}

/* Exchange Data Panel */
.ex-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px;}
@media(min-width:500px){.ex-grid{grid-template-columns:repeat(4,1fr);}}
.ex-cell{background:var(–bg-3);border:1px solid var(–border-1);border-radius:4px;padding:10px 8px;text-align:center;}
.ex-lbl{font-size:8px;color:var(–gold-dim);letter-spacing:0.08em;margin-bottom:4px;}
.ex-val{font-size:16px;font-weight:700;font-family:‘JetBrains Mono’,monospace;line-height:1.2;}
.ex-sub{font-size:8px;color:var(–text-dim);margin-top:3px;}
.ex-bar-wrap{margin:10px 0;}.ex-bar-label{font-size:9px;color:var(–text-dim);margin-bottom:4px;display:flex;justify-content:space-between;}
.ex-bar{height:10px;background:var(–bg-1);border-radius:5px;overflow:hidden;display:flex;}
.ex-bar-long{background:var(–green);height:100%;transition:width 0.3s;}
.ex-bar-short{background:var(–red);height:100%;transition:width 0.3s;}
.ex-interp{margin-top:10px;padding:10px 12px;background:rgba(200,168,78,0.04);border-left:2px solid var(–gold-dim);border-radius:0 3px 3px 0;font-size:10px;line-height:1.6;}
.ex-interp-title{font-size:8px;letter-spacing:0.12em;color:var(–gold);font-weight:600;margin-bottom:4px;}
.ex-interp-bias{font-weight:700;padding:1px 5px;border-radius:2px;font-size:10px;display:inline-block;margin-bottom:3px;}
.ex-interp-body{color:var(–text-dim);font-size:10px;line-height:1.6;}
.cvd-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px;background:var(–bg-3);border-radius:4px;}
.cvd-bar{flex:1;height:8px;background:var(–bg-1);border-radius:4px;overflow:hidden;position:relative;}
.cvd-fill{height:100%;border-radius:4px;transition:width 0.3s;}
.cvd-label{font-size:9px;color:var(–text-dim);flex-shrink:0;width:70px;}
</style>

</head>
<body>
<div class="header"><div class="hdr-top">
  <div class="hdr-left">
    <span class="hdr-logo">◆ CONFLUENCE DECK</span>
    <span class="hdr-live">● LIVE</span>
    <span class="hdr-coin" id="hc"></span>
    <span class="hdr-price" id="hp"></span>
    <span class="hdr-chg" id="hg"></span>
  </div>
  <div class="tf-tabs">
    <button class="tf-tab active" data-tf="15m">15m</button>
    <button class="tf-tab" data-tf="1h">1H</button>

    <button class="tf-tab" data-tf="1d">1D</button>

<div class="content" id="content">
  <div class="panel" id="p-chart">
    <div class="p-title"><span>EMA (10/20/60/120/200/350) + RVWAP</span><span class="p-title-r" id="ctf"></span></div>
    <div class="chart-wrap"><canvas id="cMain"></canvas></div>

          <div class="view-tog"><button class="vt-btn active" data-panel="cs1" data-view="dash">DASH</button><button class="vt-btn" data-panel="cs1" data-view="chart">CHART</button></div>
          <span class="p-title-r" id="cs1t"></span>
        </div>
      </div>
      <div id="cs1-dash"><div class="cs-grid" id="cs1g"></div><div class="sig-row" id="cs1s"></div></div>
      <div id="cs1-chart" style="display:none"><div class="ind-chart-area"><canvas id="cs1Canvas"></canvas></div><div class="legend" id="cs1Lg"></div></div>
      <div class="interp" id="interp-cs1"></div>
    </div>
    <div class="panel">
      <div class="p-title"><span>CS v2 ─ MOMENTUM</span>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="view-tog"><button class="vt-btn active" data-panel="cs2" data-view="dash">DASH</button><button class="vt-btn" data-panel="cs2" data-view="chart">CHART</button></div>
          <span class="p-title-r" id="cs2t"></span>
        </div>
      </div>
      <div id="cs2-dash"><div id="cs2b"></div><div class="sig-row" id="cs2s" style="margin-top:8px"></div></div>
      <div id="cs2-chart" style="display:none"><div class="ind-chart-area"><canvas id="cs2Canvas"></canvas></div><div class="legend" id="cs2Lg"></div></div>

  <!-- Exchange Data Panel -->

  <div class="panel" id="p-exdata">
    <div class="p-title">
      <span>거래소 데이터 ─ DERIVATIVES</span>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="view-tog">
          <button class="vt-btn active" data-panel="ex" data-view="dash">DASH</button>
          <button class="vt-btn" data-panel="ex" data-view="chart">CHART</button>
        </div>
        <span class="p-title-r" style="color:var(--text-dim);font-size:9px" id="ex-sym"></span>
      </div>
    </div>
    <div id="ex-dash">
      <div class="ex-grid" id="ex-grid"></div>
      <div id="ex-lsbar"></div>
      <div id="ex-cvd"></div>
    </div>
    <div id="ex-chart" style="display:none">
      <div class="ind-chart-area"><canvas id="exCanvas"></canvas></div>
      <div class="legend" id="exLg"></div>

    <div id="ex-interp"></div>

  <div class="footer">CONFLUENCE DECK v5 — LIVE BINANCE DATA</div>
</div>
<div class="tip-backdrop" id="tipBg"></div>
<div class="factor-tip" id="factorTip"><div class="ft-title"><span id="ftName"></span><span class="ft-close" id="ftClose">✕</span></div><div class="ft-desc" id="ftDesc"></div><div class="ft-how" id="ftHow"></div></div>

<script>
// ═══════════════════════════════════════════════════════════
// COINS & CONFIG
// ═══════════════════════════════════════════════════════════
const COINS=[
  {s:"BTC",sym:"BTCUSDT"},{s:"ETH",sym:"ETHUSDT"},{s:"XRP",sym:"XRPUSDT"},
  {s:"BNB",sym:"BNBUSDT"},{s:"SOL",sym:"SOLUSDT"},{s:"ADA",sym:"ADAUSDT"},
  {s:"DOGE",sym:"DOGEUSDT"},{s:"TRX",sym:"TRXUSDT"},{s:"AVAX",sym:"AVAXUSDT"},
  {s:"LINK",sym:"LINKUSDT"},{s:"DOT",sym:"DOTUSDT"},{s:"SHIB",sym:"SHIBUSDT"},
  {s:"TON",sym:"TONUSDT"},{s:"LTC",sym:"LTCUSDT"},{s:"UNI",sym:"UNIUSDT"},
  {s:"BCH",sym:"BCHUSDT"},{s:"NEAR",sym:"NEARUSDT"},{s:"APT",sym:"APTUSDT"},
  {s:"ICP",sym:"ICPUSDT"},{s:"SUI",sym:"SUIUSDT"},
];
const PERIODS=[10,20,60,120,200,350];
let SC=0,ST="15m",cs1View="dash",cs2View="dash";
const cache={};
let tickerData={};

// ═══════════════════════════════════════════════════════════
// BINANCE API
// ═══════════════════════════════════════════════════════════
const API="https://api.binance.com/api/v3";

async function fetchTickers(){
  try{
    const syms=COINS.map(c=>c.sym);
    const res=await fetch(`${API}/ticker/24hr`);
    const all=await res.json();
    all.forEach(t=>{if(syms.includes(t.symbol))tickerData[t.symbol]=t;});
  }catch(e){console.error("Ticker fetch failed:",e);}
}

async function fetchKlines(symbol,interval,limit=400){
  const key=`${symbol}_${interval}`;
  if(cache[key])return cache[key];
  try{
    const res=await fetch(`${API}/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
    const raw=await res.json();
    const oh=raw.map(k=>({o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5],t:k[0]}));
    cache[key]=oh;
    return oh;
  }catch(e){console.error("Klines fetch failed:",e);return null;}
}

// ═══════════════════════════════════════════════════════════
// INDICATOR CALCULATIONS (real formulas)
// ═══════════════════════════════════════════════════════════
function calcEMA(d,p){const k=2/(p+1);const e=[d[0]];for(let i=1;i<d.length;i++)e.push(d[i]*k+e[i-1]*(1-k));return e;}
function calcSMA(d,p){const r=[];for(let i=0;i<d.length;i++){const s=Math.max(0,i-p+1);let sum=0;for(let j=s;j<=i;j++)sum+=d[j];r.push(sum/(i-s+1));}return r;}
function calcRV(oh,p){const r=[];for(let i=0;i<oh.length;i++){const s=Math.max(0,i-p+1);let pv=0,sv=0;for(let j=s;j<=i;j++){const tp=(oh[j].h+oh[j].l+oh[j].c)/3;pv+=tp*oh[j].v;sv+=oh[j].v;}r.push(sv>0?pv/sv:oh[i].c);}return r;}
function calcRSI(c,p){const r=new Array(c.length).fill(50);if(c.length<p+1)return r;let ag=0,al=0;for(let i=1;i<=p;i++){const d=c[i]-c[i-1];if(d>0)ag+=d;else al-=d;}ag/=p;al/=p;r[p]=al===0?100:100-100/(1+ag/al);for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?-d:0))/p;r[i]=al===0?100:100-100/(1+ag/al);}return r;}
function calcMFI(oh,p){const m=new Array(oh.length).fill(50);for(let i=p;i<oh.length;i++){let pf=0,nf=0;for(let j=i-p+1;j<=i;j++){const tp=(oh[j].h+oh[j].l+oh[j].c)/3;const pt=j>0?(oh[j-1].h+oh[j-1].l+oh[j-1].c)/3:tp;const mf=tp*oh[j].v;if(tp>pt)pf+=mf;else nf+=mf;}m[i]=nf===0?100:100-100/(1+pf/nf);}return m;}
function calcMACD(c){const e12=calcEMA(c,12),e26=calcEMA(c,26);const mc=e12.map((v,i)=>v-e26[i]);const sg=calcEMA(mc,9);return{m:mc,s:sg,h:mc.map((v,i)=>v-sg[i])};}
function calcOBV(oh){const o=[0];for(let i=1;i<oh.length;i++){if(oh[i].c>oh[i-1].c)o.push(o[i-1]+oh[i].v);else if(oh[i].c<oh[i-1].c)o.push(o[i-1]-oh[i].v);else o.push(o[i-1]);}return o;}
function calcBB(cl,p,mult){const sma=calcSMA(cl,p);const upper=[],lower=[];for(let i=0;i<cl.length;i++){const s=Math.max(0,i-p+1);let sq=0;for(let j=s;j<=i;j++)sq+=(cl[j]-sma[i])**2;const std=Math.sqrt(sq/(i-s+1));upper.push(sma[i]+mult*std);lower.push(sma[i]-mult*std);}return{mid:sma,upper,lower};}
function calcATR(oh,p){const tr=[oh[0].h-oh[0].l];for(let i=1;i<oh.length;i++){tr.push(Math.max(oh[i].h-oh[i].l,Math.abs(oh[i].h-oh[i-1].c),Math.abs(oh[i].l-oh[i-1].c)));}return calcEMA(tr,p);}
function calcKC(cl,oh,p,mult){const mid=calcEMA(cl,p);const atr=calcATR(oh,p);return{mid,upper:mid.map((v,i)=>v+mult*atr[i]),lower:mid.map((v,i)=>v-mult*atr[i])};}

function processData(oh){
  const cl=oh.map(d=>d.c);
  const emas={},rvs={};
  PERIODS.forEach(p=>{emas[p]=calcEMA(cl,Math.min(p,cl.length-1));rvs[p]=calcRV(oh,Math.min(p,cl.length-1));});
  const L=oh.length-1;
  const rsiV=calcRSI(cl,14),mfiV=calcMFI(oh,14),md=calcMACD(cl),ov=calcOBV(oh),oe=calcEMA(ov,20);
  const bb=calcBB(cl,20,2),kc=calcKC(cl,oh,20,1.5);
  const sqz=bb.upper.map((v,i)=>bb.upper[i]<kc.upper[i]&&bb.lower[i]>kc.lower[i]);

  const f1=(cl[L]>rvs[10][L]&&cl[L]>rvs[20][L])?1:(cl[L]<rvs[10][L]&&cl[L]<rvs[20][L])?-1:0;
  const f2=cl[L]>rvs[200][L]?1:-1;
  const f3=rsiV[L]>55?1:rsiV[L]<45?-1:0;
  const f4=md.h[L]>0?1:-1;
  const bbW=cl.slice(-20).reduce((s,v)=>s+Math.abs(v-cl[L]),0)/20/cl[L];
  const f5=bbW<0.015?1:0;
  const f6=mfiV[L]>55?1:mfiV[L]<45?-1:0;
  const f7=ov[L]>oe[L]?1:-1;

  const factors=[
    {label:"RVWAP",score:f1,raw:((cl[L]/rvs[20][L]-1)*100).toFixed(2)+"%"},
    {label:"RV200",score:f2,raw:((cl[L]/rvs[200][L]-1)*100).toFixed(2)+"%"},
    {label:"VW-RSI",score:f3,raw:rsiV[L].toFixed(1)},
    {label:"VW-MACD",score:f4,raw:md.h[L].toFixed(3)},
    {label:"TTM-SQ",score:f5,raw:md.h[L]>0?"MOM+":"MOM−"},
    {label:"MFI",score:f6,raw:mfiV[L].toFixed(1)},
    {label:"OBV",score:f7,raw:ov[L]>oe[L]?"ABOVE":"BELOW"},
  ];
  const lc=factors.filter(f=>f.score>0).length,sc=factors.filter(f=>f.score<0).length;

  const emaOrder=PERIODS.map(p=>emas[p][L]);
  const bullEA=emaOrder.every((v,i)=>i===0||v<=emaOrder[i-1]);
  const bearEA=emaOrder.every((v,i)=>i===0||v>=emaOrder[i-1]);
  const e10a60=emas[10][L]>emas[60][L];
  const pA200=cl[L]>emas[200][L];
  const rvAe=rvs[10][L]>emas[10][L];
  const sp10_200=((emas[10][L]-emas[200][L])/emas[200][L]*100);

  const e10s=L>3?(emas[10][L]-emas[10][L-3])/emas[10][L-3]*100:0;
  const e20s=L>5?(emas[20][L]-emas[20][L-5])/emas[20][L-5]*100:0;
  const rvSp=(rvs[10][L]-rvs[60][L])/rvs[60][L]*100;
  const volR=oh[L].v/(oh.slice(-20).reduce((s,d)=>s+d.v,0)/20);
  const maCr=md.m[L]>md.s[L]?1:-1;
  const pE60=(cl[L]-emas[60][L])/emas[60][L]*100;
  const oMom=L>5?ov[L]-ov[L-5]:0;

  const cs2F=[
    {label:"EMA10 SLOPE",value:e10s,max:2,score:e10s>0.2?1:e10s<-0.2?-1:0},
    {label:"EMA20 SLOPE",value:e20s,max:2,score:e20s>0.15?1:e20s<-0.15?-1:0},
    {label:"RVWAP SPREAD",value:rvSp,max:3,score:rvSp>0.1?1:rvSp<-0.1?-1:0},
    {label:"VOL RATIO",value:volR,max:3,score:volR>1.2?1:0},
    {label:"MACD CROSS",value:maCr,max:1,score:maCr},
    {label:"PRICE/EMA60",value:pE60,max:5,score:pE60>0.5?1:pE60<-0.5?-1:0},
    {label:"OBV MOM",value:oMom,max:Math.max(Math.abs(oMom),1),score:oMom>100?1:oMom<-100?-1:0},
  ];
  const c2l=cs2F.filter(f=>f.score>0).length,c2s=cs2F.filter(f=>f.score<0).length;

  return{oh,cl,emas,rvs,factors,lc,sc,cs2F,c2l,c2s,lp:cl[L],
    bullEA,bearEA,e10a60,pA200,rvAe,sp10_200,
    rsi:rsiV[L],mfi:mfiV[L],e10s,e20s,rvSp,volR,pE60,oMom,
    macdHist:md.h[L],macdCross:maCr,
    rsiSeries:rsiV,mfiSeries:mfiV,macdData:md,obvSeries:ov,obvEma:oe,
    bb,kc,sqz};
}

function interpChart(d){let b,l=[];if(d.bullEA){b="long";l.push("EMA 완전 정배열. 강한 상승 추세.");}else if(d.bearEA){b="short";l.push("EMA 완전 역배열. 강한 하락 추세.");}else if(d.e10a60&&d.pA200){b="long";l.push("EMA(10)>EMA(60), 가격>EMA200. 상승 편향.");}else if(!d.e10a60&&!d.pA200){b="short";l.push("EMA(10)<EMA(60), 가격<EMA200. 하락 편향.");}else{b="neutral";l.push("EMA 구조 혼조. 횡보/전환 구간.");}if(d.rvAe)l.push("RVWAP(10)>EMA(10): 매수세 거래량 우위.");else l.push("RVWAP(10)<EMA(10): 매도세 거래량.");const sp=Math.abs(d.sp10_200).toFixed(2);if(Math.abs(d.sp10_200)>2)l.push(`EMA10-200 스프레드 ${sp}% 확대.`);else if(Math.abs(d.sp10_200)<0.5)l.push(`EMA10-200 스프레드 ${sp}% 수렴 → 압축.`);return{bias:b,lines:l};}
function interpCS1(d){let b,l=[];if(d.lc>=5){b="long";l.push(`${d.lc}/7 롱 컨플루언스 → 매수 우위.`);}else if(d.sc>=5){b="short";l.push(`${d.sc}/7 숏 컨플루언스 → 매도 우위.`);}else if(d.lc>=4){b="long";l.push(`롱 ${d.lc}/7. 편향은 있으나 5+ 미달.`);}else if(d.sc>=4){b="short";l.push(`숏 ${d.sc}/7. 편향 있으나 미달.`);}else{b="neutral";l.push(`L${d.lc}/S${d.sc}. 방향 불명확. 관망.`);}if(d.rsi>65)l.push(`RSI ${d.rsi.toFixed(0)} 과매수 경계.`);else if(d.rsi<35)l.push(`RSI ${d.rsi.toFixed(0)} 과매도.`);if(d.mfi>70)l.push(`MFI ${d.mfi.toFixed(0)} 자금 유입 강세.`);return{bias:b,lines:l};}
function interpCS2(d){let b,l=[];if(d.c2l>=5){b="long";l.push(`모멘텀 ${d.c2l}/7 롱.`);}else if(d.c2s>=5){b="short";l.push(`모멘텀 ${d.c2s}/7 숏.`);}else{b="neutral";l.push(`모멘텀 혼조 L${d.c2l}/S${d.c2s}.`);}if(Math.abs(d.e10s)>0.5)l.push(`EMA10 기울기 ${d.e10s>0?"+":""}${d.e10s.toFixed(2)}%.`);if(d.volR>1.5)l.push(`거래량 ${d.volR.toFixed(1)}x 높은 참여도.`);return{bias:b,lines:l};}

// EXCHANGE DATA: Funding, OI, Long/Short, CVD
// ═══════════════════════════════════════════════════════════
const FAPI="https://fapi.binance.com/fapi/v1";
let exData={};
let exView="dash";

async function fetchExchangeData(symbol){
  const d={symbol:symbol,funding:null,oi:null,oiPrev:null,lsRatio:null,takerBuyVol:null,takerSellVol:null,
    fundingHist:[],oiHist:[],lsHist:[],cvdHist:[]};
  // 1. Funding Rate (current)
  try{
    const r=await fetch(FAPI+"/premiumIndex?symbol="+symbol);
    const j=await r.json();
    d.funding=parseFloat(j.lastFundingRate)*100;
    d.markPrice=parseFloat(j.markPrice);
  }catch(e){console.error("Funding:",e);}
  // 2. Funding Rate History (for chart)
  try{
    const r=await fetch(FAPI+"/fundingRate?symbol="+symbol+"&limit=50");
    const j=await r.json();
    d.fundingHist=j.map(x=>({t:x.fundingTime,v:parseFloat(x.fundingRate)*100}));
  }catch(e){console.error("Funding hist:",e);}
  // 3. Open Interest (current)
  try{
    const r=await fetch(FAPI+"/openInterest?symbol="+symbol);
    const j=await r.json();
    d.oi=parseFloat(j.openInterest);
  }catch(e){console.error("OI:",e);}
  // 4. OI History (for chart + change)
  try{
    const r=await fetch("https://fapi.binance.com/futures/data/openInterestHist?symbol="+symbol+"&period=1h&limit=48");
    const j=await r.json();
    d.oiHist=j.map(x=>({t:x.timestamp,v:parseFloat(x.sumOpenInterest)}));
    if(j.length>=2){d.oiPrev=parseFloat(j[j.length-2].sumOpenInterest);d.oiNow=parseFloat(j[j.length-1].sumOpenInterest);}
  }catch(e){console.error("OI hist:",e);}
  // 5. Top Trader L/S Ratio History (for chart)
  try{
    const r=await fetch("https://fapi.binance.com/futures/data/topLongShortPositionRatio?symbol="+symbol+"&period=1h&limit=48");
    const j=await r.json();
    d.lsHist=j.map(x=>({t:x.timestamp,long:parseFloat(x.longAccount),short:parseFloat(x.shortAccount),ratio:parseFloat(x.longShortRatio)}));
    if(j.length>0){const last=j[j.length-1];d.longRatio=parseFloat(last.longAccount);d.shortRatio=parseFloat(last.shortAccount);d.lsRatio=parseFloat(last.longShortRatio);}
  }catch(e){console.error("LS Ratio:",e);}
  // 6. Taker Buy/Sell Volume (for CVD chart)
  try{
    const r=await fetch("https://fapi.binance.com/futures/data/takerlongshortRatio?symbol="+symbol+"&period=1h&limit=48");
    const j=await r.json();
    if(j.length>0){
      let totalBuy=0,totalSell=0;
      const cvdSeries=[];let cumCvd=0;
      j.forEach(x=>{
        const bv=parseFloat(x.buyVol),sv=parseFloat(x.sellVol);
        totalBuy+=bv;totalSell+=sv;cumCvd+=bv-sv;
        cvdSeries.push({t:x.timestamp,v:cumCvd,buy:bv,sell:sv});
      });
      d.takerBuyVol=totalBuy;d.takerSellVol=totalSell;d.cvd=totalBuy-totalSell;
      d.cvdHist=cvdSeries;
      if(j.length>=8){let rb=0,rs=0;for(let i=j.length-4;i<j.length;i++){rb+=parseFloat(j[i].buyVol);rs+=parseFloat(j[i].sellVol);}d.recentCvd=rb-rs;}
    }
  }catch(e){console.error("Taker vol:",e);}
  // 7. Global L/S Ratio
  try{
    const r=await fetch("https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol="+symbol+"&period=1h&limit=1");
    const j=await r.json();
    if(j.length>0){d.globalLong=parseFloat(j[0].longAccount);d.globalShort=parseFloat(j[0].shortAccount);d.globalLSR=parseFloat(j[0].longShortRatio);}
  }catch(e){console.error("Global LS:",e);}
  exData[symbol]=d;
  return d;
}

function renderExChart(){
  const sym=COINS[SC].sym;const d=exData[sym];
  const canvas=document.getElementById("exCanvas");
  if(!canvas||!d)return;
  const rect=canvas.parentElement.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  const W=rect.width,H=380;
  canvas.style.height=H+"px";canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);

  const pad={l:2,r:42,t:4,b:4};
  const cW=W-pad.l-pad.r;
  // 4 sub-panels stacked vertically
  const panelH=(H-16)/4;
  const panels=[
    {label:"FUNDING RATE (%)",data:d.fundingHist.map(x=>x.v),color:"#FFD700",zeroLine:true},
    {label:"OPEN INTEREST",data:d.oiHist.map(x=>x.v),color:"#00BFFF",zeroLine:false},
    {label:"L/S RATIO (Top)",data:d.lsHist.map(x=>x.ratio),color:"#A87BD2",zeroLine:false,oneLine:true},
    {label:"CVD (Cumulative)",data:d.cvdHist.map(x=>x.v),color:"#7BC86C",zeroLine:true,isHist:true},
  ];

  panels.forEach((p,pi)=>{
    const yTop=pi*(panelH+4)+pad.t;
    const data=p.data;
    if(!data||data.length<2)return;
    const n=data.length;
    const tX=i=>pad.l+(i/(n-1))*cW;

    let mn=Math.min(...data),mx=Math.max(...data);
    if(p.oneLine){mn=Math.min(mn,0.8);mx=Math.max(mx,1.2);}
    if(p.zeroLine){mn=Math.min(mn,0);mx=Math.max(mx,0);}
    const rng=mx-mn||1;
    const tY=v=>yTop+4+((mx-v)/rng)*(panelH-12);

    // Panel background
    ctx.fillStyle="rgba(18,17,14,0.6)";ctx.fillRect(pad.l,yTop,cW+pad.r,panelH);
    // Panel label
    ctx.fillStyle=p.color;ctx.globalAlpha=0.7;ctx.font="bold 8px JetBrains Mono";ctx.fillText(p.label,pad.l+4,yTop+10);ctx.globalAlpha=1;
    // Y-axis values
    ctx.fillStyle="#6B6040";ctx.font="7px JetBrains Mono";
    ctx.fillText(mx>=100?mx.toFixed(0):mx.toFixed(4),W-pad.r+2,yTop+10);
    ctx.fillText(mn>=100?mn.toFixed(0):mn.toFixed(4),W-pad.r+2,yTop+panelH-4);

    // Zero/one line
    if(p.zeroLine&&mn<0&&mx>0){
      const zy=tY(0);
      ctx.strokeStyle="rgba(138,128,96,0.3)";ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(pad.l,zy);ctx.lineTo(W-pad.r,zy);ctx.stroke();ctx.setLineDash([]);
    }
    if(p.oneLine){
      const oy=tY(1);
      ctx.strokeStyle="rgba(138,128,96,0.3)";ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(pad.l,oy);ctx.lineTo(W-pad.r,oy);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle="#6B6040";ctx.font="7px JetBrains Mono";ctx.fillText("1.0",W-pad.r+2,oy+3);
    }

    if(p.isHist){
      // CVD as histogram bars
      const barW2=Math.max(1,cW/n*0.7);
      const zy=tY(0);
      data.forEach((v,i)=>{
        const x=tX(i);const h=Math.abs(tY(v)-zy);
        ctx.fillStyle=v>=0?"rgba(123,200,108,0.5)":"rgba(232,115,74,0.5)";
        if(v>=0)ctx.fillRect(x-barW2/2,tY(v),barW2,h);
        else ctx.fillRect(x-barW2/2,zy,barW2,h);
      });
    }else{
      // Line + area fill
      ctx.beginPath();data.forEach((v,i)=>{const x=tX(i),y=tY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.lineTo(tX(n-1),yTop+panelH-4);ctx.lineTo(tX(0),yTop+panelH-4);ctx.closePath();
      ctx.fillStyle=p.color+"12";ctx.fill();
      // Line
      ctx.beginPath();ctx.strokeStyle=p.color;ctx.lineWidth=1.5;ctx.globalAlpha=0.8;
      data.forEach((v,i)=>{const x=tX(i),y=tY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke();ctx.globalAlpha=1;
    }

    // Current value label
    const lastVal=data[data.length-1];
    ctx.fillStyle=p.color;ctx.font="bold 9px JetBrains Mono";
    ctx.fillText(lastVal>=100?lastVal.toFixed(0):lastVal.toFixed(4),tX(n-1)-30,tY(lastVal)-6);

    // Bottom separator
    if(pi<3){ctx.strokeStyle="rgba(42,38,24,0.4)";ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(pad.l,yTop+panelH+1);ctx.lineTo(W-pad.r,yTop+panelH+1);ctx.stroke();}
  });

  // Legend
  const lg=document.getElementById("exLg");
  lg.innerHTML=`<div class="legend-item"><span class="lg-line" style="background:#FFD700"></span>Funding</div><div class="legend-item"><span class="lg-line" style="background:#00BFFF"></span>OI</div><div class="legend-item"><span class="lg-line" style="background:#A87BD2"></span>L/S Ratio</div><div class="legend-item"><span class="lg-line" style="background:#7BC86C"></span>CVD</div><div class="legend-item" style="color:var(--text-dim)">48h history · 1h interval</div>`;
}

function interpExData(d){
  if(!d||!d.funding===null)return{bias:"neutral",lines:["데이터 로드 중..."]};
  let bias="neutral",lines=[];

  // Funding interpretation
  if(d.funding!==null){
    if(d.funding<-0.01){
      lines.push(`펀딩비율 ${d.funding.toFixed(4)}% — 네거티브. 숏 포지션 과밀. 숏스퀴즈 트리거 대기 중.`);
      bias="long";
    }else if(d.funding>0.03){
      lines.push(`펀딩비율 ${d.funding.toFixed(4)}% — 양수 과열. 롱 포지션 과밀. 롱스퀴즈 리스크.`);
      bias="short";
    }else if(d.funding>0){
      lines.push(`펀딩비율 ${d.funding.toFixed(4)}% — 소폭 양수. 롱 우위이나 과열 아님.`);
    }else{
      lines.push(`펀딩비율 ${d.funding.toFixed(4)}% — 소폭 음수. 숏 약간 우위.`);
    }
  }

  // OI interpretation
  if(d.oiPrev&&d.oiNow){
    const oiChg=((d.oiNow-d.oiPrev)/d.oiPrev*100);
    if(oiChg>3){
      lines.push(`OI 1h +${oiChg.toFixed(1)}% 급증 — 새 포지션 대거 진입. 방향 결정 시 변동성 폭발 가능.`);
    }else if(oiChg<-3){
      lines.push(`OI 1h ${oiChg.toFixed(1)}% 감소 — 포지션 정리 중. 청산 또는 이익실현.`);
    }else{
      lines.push(`OI 변화 ${oiChg.toFixed(1)}% — 안정적. 큰 포지션 변동 없음.`);
    }
  }

  // L/S Ratio interpretation
  if(d.lsRatio!==null){
    if(d.lsRatio>1.5){
      lines.push(`탑 트레이더 L/S ${d.lsRatio.toFixed(2)} — 롱 강세. 기관/고래가 상승에 베팅 중.`);
      if(bias==="neutral")bias="long";
    }else if(d.lsRatio<0.7){
      lines.push(`탑 트레이더 L/S ${d.lsRatio.toFixed(2)} — 숏 강세. 기관/고래가 하락에 베팅 중.`);
      if(bias==="neutral")bias="short";
    }else{
      lines.push(`탑 트레이더 L/S ${d.lsRatio.toFixed(2)} — 균형. 명확한 방향성 없음.`);
    }
  }

  // CVD interpretation
  if(d.cvd!==undefined&&d.cvd!==null){
    const cvdDir=d.cvd>0?"양수(매수 우위)":"음수(매도 우위)";
    lines.push(`24h CVD ${cvdDir} — Taker 기준 ${d.cvd>0?"매수":"매도"} 거래량이 더 많았다.`);
    if(d.recentCvd!==undefined){
      const recent=d.recentCvd>0?"매수 가속":"매도 가속";
      lines.push(`최근 4h CVD ${recent} — ${Math.abs(d.recentCvd).toFixed(0)} 차이.`);
    }
  }

  // Combined signal
  let bullCount=0,bearCount=0;
  if(d.funding!==null&&d.funding<-0.005)bullCount++;
  if(d.funding!==null&&d.funding>0.03)bearCount++;
  if(d.lsRatio!==null&&d.lsRatio>1.3)bullCount++;
  if(d.lsRatio!==null&&d.lsRatio<0.8)bearCount++;
  if(d.cvd!==undefined&&d.cvd>0)bullCount++;
  if(d.cvd!==undefined&&d.cvd<0)bearCount++;
  if(d.oiPrev&&d.oiNow&&d.oiNow>d.oiPrev*1.02)bullCount++; // OI rising = conviction

  if(bullCount>=3)bias="long";
  else if(bearCount>=3)bias="short";
  else if(bullCount>bearCount)bias="long";
  else if(bearCount>bullCount)bias="short";

  lines.push(`종합: 매수 시그널 ${bullCount}개 / 매도 시그널 ${bearCount}개.`);

  return{bias,lines};
}

  const oiStr=d.oi?d.oi.toLocaleString("en",{maximumFractionDigits:0}):"N/A";

  grid.innerHTML=`
    <div class="ex-cell">
      <div class="ex-lbl">FUNDING RATE</div>
      <div class="ex-val" style="color:${fundColor}">${d.funding!==null?d.funding.toFixed(4)+"%":"N/A"}</div>
      <div class="ex-sub">${d.funding!==null?(d.funding<0?"숏이 수수료 납부":"롱이 수수료 납부"):"—"}</div>
    </div>
    <div class="ex-cell">
      <div class="ex-lbl">OPEN INTEREST</div>
      <div class="ex-val">${oiStr}</div>
      <div class="ex-sub" style="color:${oiChgColor}">${oiChg!==0?(oiChg>0?"+":"")+oiChg.toFixed(1)+"%":"—"} 1h</div>
    </div>
    <div class="ex-cell">
      <div class="ex-lbl">TOP L/S RATIO</div>
      <div class="ex-val" style="color:${d.lsRatio?(d.lsRatio>1?"var(--green)":"var(--red)"):"var(--text-dim)"}">${d.lsRatio?d.lsRatio.toFixed(2):"N/A"}</div>
      <div class="ex-sub">${d.lsRatio?(d.lsRatio>1?"롱 우위":"숏 우위"):"—"}</div>
    </div>
    <div class="ex-cell">
      <div class="ex-lbl">24h CVD</div>
      <div class="ex-val" style="color:${d.cvd?(d.cvd>0?"var(--green)":"var(--red)"):"var(--text-dim)"}">${d.cvd?(d.cvd>0?"+":"")+d.cvd.toFixed(0):"N/A"}</div>
      <div class="ex-sub">${d.cvd?(d.cvd>0?"Taker 매수 우위":"Taker 매도 우위"):"—"}</div>
    </div>`;

  // Long/Short bar
  if(d.longRatio&&d.shortRatio){
    const lPct=(d.longRatio*100).toFixed(1);
    const sPct=(d.shortRatio*100).toFixed(1);
    lsbar.innerHTML=`
      <div class="ex-bar-wrap">
        <div class="ex-bar-label"><span style="color:var(--green)">LONG ${lPct}%</span><span>Top Traders</span><span style="color:var(--red)">SHORT ${sPct}%</span></div>
        <div class="ex-bar"><div class="ex-bar-long" style="width:${lPct}%"></div><div class="ex-bar-short" style="width:${sPct}%"></div></div>
      </div>`;
    // Global ratio bar
    if(d.globalLong&&d.globalShort){
      const glPct=(d.globalLong*100).toFixed(1);
      const gsPct=(d.globalShort*100).toFixed(1);
      lsbar.innerHTML+=`
        <div class="ex-bar-wrap" style="margin-top:6px">
          <div class="ex-bar-label"><span style="color:var(--green)">LONG ${glPct}%</span><span>All Traders</span><span style="color:var(--red)">SHORT ${gsPct}%</span></div>
          <div class="ex-bar"><div class="ex-bar-long" style="width:${glPct}%"></div><div class="ex-bar-short" style="width:${gsPct}%"></div></div>
        </div>`;
    }
  }else{lsbar.innerHTML="";}

  // CVD bar
  if(d.takerBuyVol&&d.takerSellVol){
    const total=d.takerBuyVol+d.takerSellVol;
    const buyPct=(d.takerBuyVol/total*100).toFixed(1);
    const sellPct=(d.takerSellVol/total*100).toFixed(1);
    cvdEl.innerHTML=`
      <div class="cvd-row">
        <span class="cvd-label" style="color:var(--green)">Buy ${buyPct}%</span>
        <div class="cvd-bar"><div class="cvd-fill" style="width:${buyPct}%;background:var(--green);opacity:0.6"></div></div>
        <span class="cvd-label" style="color:var(--red);text-align:right">Sell ${sellPct}%</span>
      </div>
      <div style="text-align:center;font-size:8px;color:var(--text-dim);margin-top:4px">24h Taker Buy vs Sell Volume</div>`;
  }else{cvdEl.innerHTML="";}

  // Interpretation
  const interp=interpExData(d);
  const biasLabel=interp.bias==="long"?"BULLISH":interp.bias==="short"?"BEARISH":"NEUTRAL";
  const biasColor=interp.bias==="long"?"var(--green)":interp.bias==="short"?"var(--red)":"var(--text-dim)";
  const biasBg=interp.bias==="long"?"rgba(123,200,108,0.1)":interp.bias==="short"?"rgba(232,115,74,0.1)":"rgba(138,128,96,0.1)";
  interpEl.innerHTML=`
    <div class="ex-interp">
      <div class="ex-interp-title">파생상품 구조 해석</div>
      <span class="ex-interp-bias" style="color:${biasColor};background:${biasBg}">${biasLabel}</span>
      <div class="ex-interp-body">${interp.lines.join(" ")}</div>
    </div>`;
}

async function fetchAndRenderExData(){
  try{await fetchExchangeData(COINS[SC].sym);}catch(e){console.error("ExData:",e);}
  renderExData();
}

async function init(){
  renderStrip(); renderHdr();
  document.getElementById("p-chart").querySelector(".chart-wrap").innerHTML='<div class="loading">CONNECTING TO BINANCE</div><canvas id="cMain"></canvas>';
  await fetchTickers();
  renderStrip();
  await loadAndRender();

  // Auto-refresh every 60s
  setInterval(async()=>{
    const key=`${COINS[SC].sym}_${ST}`;
    delete cache[key];
    await fetchTickers();
    await loadAndRender();
  },60000);
}

// Events
document.querySelectorAll(".tf-tab").forEach(b=>{b.addEventListener("click",()=>{document.querySelectorAll(".tf-tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");ST=b.dataset.tf;const key=`${COINS[SC].sym}_${ST}`;delete cache[key];loadAndRender();});});
document.querySelectorAll(".vt-btn").forEach(btn=>{btn.addEventListener("click",()=>{const panel=btn.dataset.panel,view=btn.dataset.view;btn.parentElement.querySelectorAll(".vt-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");if(panel==="cs1"){cs1View=view;renderCS1();}else if(panel==="cs2"){cs2View=view;renderCS2();}else if(panel==="ex"){exView=view;renderExData();}});});
let rt;window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(()=>{if(D){renderChart();if(cs1View==="chart")renderCS1Chart();if(cs2View==="chart")renderCS2Chart();}if(exView==="chart")renderExChart();},80);});

init();
</script>
