<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◆ CRYPTO REPORT</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0b0f;color:#e8e6e3;font-family:'IBM Plex Sans',-apple-system,sans-serif;padding-bottom:40px}
header{padding:14px 16px;border-bottom:1px solid #1e2028;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#0a0b0fee;backdrop-filter:blur(10px);z-index:10;gap:8px}
.logo{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1px;white-space:nowrap}
.logo span{color:#00ffa3}
.ts{font-size:10px;color:#6b7080;background:#1e2028;padding:2px 8px;border-radius:10px;white-space:nowrap}
.tabs{display:flex;background:#13141a;border-radius:8px;border:1px solid #1e2028;overflow:hidden}
.tab{padding:6px 14px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#6b7080;transition:all .2s;font-family:'IBM Plex Sans',sans-serif}
.tab.active{background:#1e2028;color:#00ffa3}
.refresh{padding:6px 12px;border:1px solid #00ffa340;border-radius:8px;background:#00ffa310;color:#00ffa3;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif}
.refresh:disabled{background:#1e2028;cursor:wait}
main{max-width:720px;margin:0 auto;padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.card{background:#13141a;border:1px solid #1e2028;border-radius:10px;padding:14px 16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
.badge{font-size:10px;color:#8a8f98;background:#1e2028;padding:2px 8px;border-radius:10px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:4px;margin-bottom:2px}
.narrative{font-size:13px;color:#c9cdd4;line-height:1.6;margin-top:4px}
.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:8px}
.price-card{background:#13141a;border:1px solid #1e2028;border-radius:10px;padding:12px 14px}
.pc-top{display:flex;justify-content:space-between;align-items:center}
.pc-sym{font-size:14px;font-weight:700}
.pc-price{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px;margin:6px 0 2px}
.pc-chg{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 8px;color:#6b7080;font-weight:600;border-bottom:1px solid #1e2028;font-size:10px;text-transform:uppercase;letter-spacing:.5px;text-align:left}
th.r{text-align:right}
td{padding:7px 8px;color:#c9cdd4;font-size:12px;text-align:left}
td.r{text-align:right;font-family:'JetBrains Mono',monospace}
tr{border-bottom:1px solid #1e202808}
.interpret{margin-top:10px;padding:10px 12px;background:#0d1117;border-left:3px solid #ffaa00;border-radius:0 6px 6px 0;font-size:12px;color:#c9cdd4;line-height:1.6}
.counter{margin-top:8px;padding:8px 12px;background:#1a0a0a;border-left:3px solid #ff4466;border-radius:0 6px 6px 0;font-size:12px;color:#ff8899;line-height:1.6}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.gauge-val{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.gauge-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.gauge-streak{font-size:10px;color:#8a8f98}
.alert-row{padding:8px 0;border-bottom:1px solid #1e2028;display:flex;gap:8px;align-items:flex-start}
.alert-row:last-child{border-bottom:none}
.alert-event{font-size:12px;color:#e8e6e3;font-weight:600}
.alert-reason{font-size:11px;color:#8a8f98;margin-top:2px}
.liq-row{margin-bottom:10px}
.liq-sym{font-size:13px;font-weight:700;margin-bottom:4px}
.liq-chips{display:flex;gap:6px;flex-wrap:wrap;font-size:11px}
.flow-row{padding:6px 0;border-bottom:1px solid #1e2028}
.flow-row:last-child{border-bottom:none}
.flow-top{display:flex;justify-content:space-between;align-items:center}
.flow-sym{font-weight:700;font-size:13px}
.flow-amt{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace}
.flow-sub{font-size:10px;color:#8a8f98;margin-top:2px}
.struct-grid{display:flex;gap:6px;flex-wrap:wrap}
.struct-item{flex:1;min-width:80px;background:#0d1117;border-radius:6px;padding:8px 10px;text-align:center}
.struct-lbl{font-size:10px;color:#6b7080;margin-bottom:4px}
.struct-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.struct-chg{font-size:11px;font-weight:600}
.remember-row{padding:8px 0;border-bottom:1px solid #1e2028;display:flex;gap:8px}
.remember-row:last-child{border-bottom:none}
.remember-num{color:#ffaa00;font-weight:800;font-size:16px;line-height:1.4;flex-shrink:0}
.remember-txt{font-size:12px;color:#c9cdd4;line-height:1.5}
.scenario-row{padding:10px 0;border-bottom:1px solid #1e2028}
.scenario-row:last-child{border-bottom:none}
.scenario-sym{font-size:14px;font-weight:700;margin-bottom:6px}
.scenario-cols{display:flex;gap:6px;margin-bottom:4px}
.bull-box{flex:1;background:#00ffa30a;border:1px solid #00ffa320;border-radius:6px;padding:6px 10px;font-size:11px;color:#00ffa3}
.bear-box{flex:1;background:#ff44660a;border:1px solid #ff446620;border-radius:6px;padding:6px 10px;font-size:11px;color:#ff4466}
.box-title{font-weight:700;margin-bottom:2px}
.key-level{font-size:10px;color:#8a8f98}
.footer{text-align:center;margin-top:20px;font-size:10px;color:#4a4f5a}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
    <div class="logo"><span>◆</span> CRYPTO REPORT</div>
    <div class="ts" id="ts"></div>
  </div>
  <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
    <div class="tabs">
      <button class="tab active" onclick="switchMode('daily')">데일리</button>
      <button class="tab" onclick="switchMode('weekly')">주간</button>
    </div>
    <button class="refresh" id="refreshBtn" onclick="fetchReport()">🔄 새로고침</button>
  </div>
</header>
<main id="main"></main>
<script>
const MOCK_DAILY={date:"2026-03-16",narrative:{tags:["#숏스퀴즈","#기관매집"],summary:"BTC 네거티브 펀딩 상태에서 스팟 ETF $767M 유입이 숏 청산을 촉발. ETH는 고래 매집 + ETF 유입이 동시에 겹치면서 알트 반등을 주도."},prices:[{symbol:"BTC",price:73795,change:3.2,category:"L1"},{symbol:"ETH",price:2264,change:7.5,category:"L1"},{symbol:"SOL",price:93.66,change:1.5,category:"L1"},{symbol:"XAUT",price:4971,change:0.1,category:"Commodity"}],metrics:{totalMcap:"2.52T",mcapChange:3.4,btcD:56.9,fng:15,fngLabel:"Extreme Fear",fngStreak:38,funding:-0.010,oi:"687,200 BTC",oiChange:5,totalOI:"$107.6B",totalOIChange:5},tradfi:[{label:"S&P 500",price:"6,632",change:-0.61},{label:"QQQ",price:"593.72",change:-0.59},{label:"TSLA",price:"391.20",change:-0.96},{label:"KOSPI",price:"5,550",change:1.14},{label:"Oil",price:"$104",change:2.1}],signals:[{symbol:"ETH",signal:"LONG",priority:3,tags:"고래매집 + ETF유입 + OI신고 + 풋소멸",interpretation:"4개 요소 동시 정렬 = 기관 매집 패턴. $2,200 지지 시 $2,400-$2,500 테스트.",counter:"BTC $74K 돌파 실패 시 동반 하락. FOMC 매파 발언 리스크."},{symbol:"BTC",signal:"LONG",priority:2,tags:"숏스퀴즈 세팅 + ETF유입",interpretation:"$74,300 돌파 시 $80K 열림. 네거티브 펀딩 + 스팟 매수 = 스퀴즈 구조.",counter:"FOMC 매파 → 리스크오프. 유가 $100+ 지속 → 금리인하 기대 후퇴."}],alerts:[{target:"BTC",event:"30분 내 $1,800 급등",reason:"숏 $113M 강제 청산"},{target:"ETH",event:"24h +7.5% 급등",reason:"Voorhees $49M 매집 + ETF $161M"},{target:"심리",event:"공포탐욕 15, 38일 연속",reason:"2022 루나 이후 최장 극단적 공포"},{target:"매크로",event:"FOMC 내일 시작",reason:"금리 동결 예상, 파월 발언이 변수"}],liqMap:[{symbol:"BTC",longLiq:"$71,200-$71,800",shortLiq:"$75,000-$76,500"},{symbol:"ETH",longLiq:"$2,100-$2,150",shortLiq:"$2,350-$2,400"}],netflow:[{symbol:"BTC",direction:"유출",amount:"-12,400 BTC",meaning:"홀딩 시그널"},{symbol:"ETH",direction:"유출",amount:"-48,000 ETH",meaning:"콜드월렛 이동"}],structure:[{label:"TOTAL",value:"2.491T",change:1.58},{label:"TOTAL2",value:"1.015T",change:1.91},{label:"TOTAL3",value:"741.4B",change:1.15},{label:"USDT.D",value:"7.387%",change:-1.58},{label:"TOTALDEFI",value:"78.1B",change:2.25}],remember:["ETH가 주인공. 고래 매집 + ETF 유입 + OI 증가 + 풋 소멸 동시 발생 = 기관 매집 패턴.","가격 ↑ vs 심리 ↓ 괴리. 공포탐욕 15인데 BTC는 40일 고점. 괴리 해소 시 큰 움직임.","내일 FOMC가 분기점. 금리 동결은 기정사실. 파월 발언 톤이 이번 주 방향 결정."]};
const MOCK_WEEKLY={week:"2026-03-10 ~ 03-16",narrative:{tags:["#극단공포속반등","#ETH기관매집","#FOMC대기"],summary:"38일 연속 Extreme Fear에도 BTC는 $66K→$74K 레인지 상단을 테스트. ETH는 Voorhees 매집과 ETF 3주 연속 유입으로 주간 +12% 기록."},performance:[{symbol:"BTC",open:70100,close:73795,high:74300,low:69200,weekPct:5.3},{symbol:"ETH",open:2020,close:2264,high:2280,low:1960,weekPct:12.1},{symbol:"SOL",open:85,close:93.66,high:95,low:82,weekPct:10.2},{symbol:"XAUT",open:4990,close:4971,high:5010,low:4950,weekPct:-0.4}],signalReview:[{date:"03-11",symbol:"BTC",signal:"LONG",entry:70200,current:73795,result:"WIN",pct:5.1},{date:"03-13",symbol:"ETH",signal:"LONG",entry:2133,current:2264,result:"WIN",pct:6.1},{date:"03-12",symbol:"SOL",signal:"LONG",entry:88,current:93.66,result:"WIN",pct:6.4}],sectors:[{name:"L1",change:7.2,flow:"유입"},{name:"DeFi",change:5.8,flow:"유입"},{name:"L2",change:3.1,flow:"소폭유입"},{name:"AI",change:8.5,flow:"강한유입"},{name:"Meme",change:-2.3,flow:"유출"},{name:"Infra",change:1.5,flow:"중립"}],scenarios:[{symbol:"BTC",bullish:"$74,300 돌파 + 거래량 동반 → $80,000",bearish:"$70,500 이탈 → $66,000 재테스트",keyLevel:"저항 $74,300 / 지지 $70,500"},{symbol:"ETH",bullish:"$2,200 지지 유지 → $2,500",bearish:"$2,100 이탈 → $1,960",keyLevel:"저항 $2,400 / 지지 $2,200"},{symbol:"SOL",bullish:"$95 돌파 → $105",bearish:"$88 이탈 → $82",keyLevel:"저항 $95 / 지지 $88"}],macroCalendar:[{date:"3/17-18",event:"FOMC",impact:"상",note:"금리 동결 예상. 파월 발언 톤이 핵심"},{date:"3/19",event:"미국 주택착공",impact:"중",note:"경기 선행지표"},{date:"3/21",event:"유럽 PMI 속보",impact:"중",note:"글로벌 경기 센티먼트"}],remember:["ETH 주간 +12% — 기관 매집 구조 확인. $2,200 지지 여부가 다음 주 핵심.","시그널 3/3 WIN — 극단적 공포 구간에서의 롱 시그널 적중률 100%.","FOMC + 유가가 다음 주 최대 변수."]};

const STARS={3:“★★★”,2:“★★”,1:“★”,0:“☆”};
let mode=“daily”,dailyData=MOCK_DAILY,weeklyData=MOCK_WEEKLY;

const fp=p=>p>=10000?`$${p.toLocaleString("en-US",{maximumFractionDigits:0})}`:p>=1?`$${p.toLocaleString("en-US",{maximumFractionDigits:2})}`:`$${p.toFixed(4)}`;
const fpc=p=>`${p>=0?"+":""}${p.toFixed(1)}%`;
const pc=p=>p>0?”#00ffa3”:p<0?”#ff4466”:”#8a8f98”;
const gc=v=>v<=25?”#ff4466”:v<=50?”#ffaa00”:v<=75?”#88cc44”:”#00ffa3”;
const tg=(t,c=”#00ffa3”)=>`<span class="tag" style="background:${c}18;color:${c};border:1px solid ${c}30">${t}</span>`;
const ibox=t=>`<div class="interpret">💡 ${t}</div>`;
const cbox=t=>`<div class="counter"><b>⚠ 반대 시나리오:</b> ${t}</div>`;
function card(title,content,accent,badge){return`<div class="card"><div class="card-header"><div class="card-title" style="color:${accent||"#e8e6e3"}">${title}</div>${badge?`<div class="badge">${badge}</div>`:""}</div>${content}</div>`;}
function tbl(headers,rows){
const ths=headers.map((h,i)=>`<th${i>0?' class="r"':''}>${h}</th>`).join(””);
const trs=rows.map(r=>`<tr>${r.map((c,i)=>`<td${i>0?’ class=“r”’:’’}>${c}</td>`).join("")}</tr>`).join(””);
return`<div style="overflow-x:auto"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}
function gauge(value,label,streak){
const color=gc(value);
const angle=(value/100)*180-90;
const rad=angle*Math.PI/180;
const x2=(60+36*Math.cos(rad)).toFixed(1),y2=(58+36*Math.sin(rad)).toFixed(1);
const dash=((value/100)*157).toFixed(1);
return`<div class="gauge-wrap"><svg width="120" height="68" viewBox="0 0 120 68"><path d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="#1e2028" stroke-width="8" stroke-linecap="round"/><path d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${dash} 157"/><line x1="60" y1="58" x2="${x2}" y2="${y2}" stroke="#e8e6e3" stroke-width="2" stroke-linecap="round"/><circle cx="60" cy="58" r="3" fill="#e8e6e3"/></svg><div class="gauge-val" style="color:${color}">${value}</div><div class="gauge-lbl" style="color:${color}">${label}</div>${streak?`<div class="gauge-streak">${streak}일 연속</div>`:""}</div>`;
}
function barSVG(data,kx,ky){
const vals=data.map(d=>d[ky]);
const max=Math.max(…vals.map(Math.abs))||1;
const W=300,H=100,n=data.length,bw=Math.floor(W/n)-6,mid=H/2;
const rects=data.map((d,i)=>{
const pct=d[ky]/max,bh=Math.abs(pct)*(mid-4),x=i*(W/n)+3,y=pct>=0?mid-bh:mid,c=d[ky]>=0?”#00ffa3”:”#ff4466”;
return`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${c}" opacity=".7"/><text x="${(x+bw/2).toFixed(0)}" y="${H-2}" text-anchor="middle" fill="#6b7080" font-size="10">${d[kx]}</text>`;
}).join(””);
return`<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">${rects}<line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="#1e2028" stroke-width="1"/></svg>`;
}
function hbarSVG(data,kl,kv){
const max=Math.max(…data.map(d=>Math.abs(d[kv])))||1;
const W=280,rh=24,H=data.length*rh+8,lw=38,baw=W-lw-36;
const rows=data.map((d,i)=>{
const c=d[kv]>=0?”#00ffa3”:”#ff4466”,bw=(Math.abs(d[kv]/max)*baw).toFixed(1),y=i*rh+4;
return`<text x="${lw-4}" y="${y+15}" text-anchor="end" fill="#c9cdd4" font-size="11">${d[kl]}</text><rect x="${lw}" y="${y+5}" width="${bw}" height="${rh-10}" rx="3" fill="${c}" opacity=".65"/><text x="${parseFloat(bw)+lw+4}" y="${y+15}" fill="${c}" font-size="10">${fpc(d[kv])}</text>`;
}).join(””);
return`<svg width="100%" viewBox="0 0 ${W} ${H}">${rows}</svg>`;
}

function renderDaily(d){
const sm={};d.signals.forEach(s=>{sm[s.symbol]=s;});
const pcards=d.prices.map(c=>{
const s=sm[c.symbol];
return`<div class="price-card"><div class="pc-top"><span class="pc-sym">${c.symbol}</span>${s?`<span style=“color:${s.signal===“LONG”?”#00ffa3”:”#ff4466”};font-weight:700;font-size:13px;font-family:‘JetBrains Mono’,monospace”>${s.signal===“LONG”?“▲”:“▼”} ${s.signal} <span style=“color:${s.priority>=3?”#ffaa00”:s.priority>=2?”#00ffa3”:”#8a8f98”}”>${STARS[s.priority]||“☆”}</span></span>`:""}</div><div class="pc-price">${fp(c.price)}</div><div class="pc-chg" style="color:${pc(c.change)}">${fpc(c.change)}</div></div>`;
}).join(””);
return` ${card("오늘의 내러티브",`<div style="margin-bottom:6px">${d.narrative.tags.map(t=>tg(t,”#ffaa00”)).join(””)}</div><div class="narrative">${d.narrative.summary}</div>`,”#ffaa00”)}

  <div class="price-grid">${pcards}</div>
  <div class="two-col">
    ${card("시장 지표",tbl(["지표","값"],[["총 시총",d.metrics.totalMcap],["BTC.D",`${d.metrics.btcD}%`],["BTC 펀딩",`<span style="color:${d.metrics.funding<0?"#ff4466":"#00ffa3"}">${d.metrics.funding}%</span>`],["BTC OI",`${d.metrics.oi} <small style="color:#00ffa3">+${d.metrics.oiChange}%</small>`],["총 선물 OI",`${d.metrics.totalOI} <small style="color:#00ffa3">+${d.metrics.totalOIChange}%</small>`]]),"#e8e6e3","Market")}
    ${card("공포 & 탐욕",gauge(d.metrics.fng,d.metrics.fngLabel,d.metrics.fngStreak)+ibox("가격은 40일 고점인데 심리는 극단적 공포. 괴리 해소 시 큰 움직임."),null,"Sentiment")}
  </div>
  ${card("외부 시장",tbl(["지표","가격","변동"],d.tradfi.map(t=>[t.label,t.price,`<span style="color:${pc(t.change)};font-weight:600">${fpc(t.change)}</span>`]))+ibox("미국 주식 약세인데 BTC 상승 — 드문 디커플링."),"#e8e6e3","TradFi")}
  ${card("⚠ 이상 감지",d.alerts.map(a=>`<div class="alert-row">${tg(a.target,"#ff4466")}<div><div class="alert-event">${a.event}</div><div class="alert-reason">${a.reason}</div></div></div>`).join(""),"#ff4466","Alert")}
  <div class="two-col">
    ${card("청산 지도",d.liqMap.map(l=>`<div class="liq-row"><div class="liq-sym">${l.symbol}</div><div class="liq-chips"><span style="background:#ff446618;color:#ff4466;padding:2px 8px;border-radius:4px">롱청산 ${l.longLiq}</span><span style="background:#00ffa318;color:#00ffa3;padding:2px 8px;border-radius:4px">숏청산 ${l.shortLiq}</span></div></div>`).join("")+ibox("BTC 숏 청산 $75K 집중. 돌파 시 연쇄 가속."),"#ff6b35","Liquidation")}
    ${card("거래소 자금 흐름",d.netflow.map(n=>`<div class="flow-row"><div class="flow-top"><span class="flow-sym">${n.symbol}</span><span class="flow-amt" style="color:${n.direction==="유출"?"#00ffa3":"#ff4466"}">${n.amount}</span></div><div class="flow-sub">${n.direction} → ${n.meaning}</div></div>`).join("")+ibox("BTC/ETH 순유출. 매도 물량 감소 + ETF 매수 = 상승 압력."),"#4ecdc4","On-chain")}
  </div>
  ${d.signals.map(s=>card(`${s.symbol} 상세분석`,`<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">${s.tags.split(" + ").map(t=>tg(t)).join("")}</div>${ibox(s.interpretation)}${cbox(s.counter)}`,s.signal==="LONG"?"#00ffa3":"#ff4466",STARS[s.priority])).join("")}
  ${card("시장 구조",`<div class="struct-grid">${d.structure.map(s=>`<div class="struct-item"><div class="struct-lbl">${s.label}</div><div class="struct-val">${s.value}</div><div class="struct-chg" style="color:${pc(s.change)}">${fpc(s.change)}</div></div>`).join("")}</div>${ibox("USDT.D -1.58%가 핵심. 현금→코인 자금 이동 중.")}`, "#6c5ce7","상급자용")}
  ${card("오늘 기억할 것 3가지",d.remember.map((r,i)=>`<div class="remember-row"><span class="remember-num">${i+1}</span><span class="remember-txt">${r}</span></div>`).join(""),"#ffaa00")}
  <div class="footer">이 리포트는 투자 조언이 아닌 시장 구조 분석입니다.</div>`;
}

function renderWeekly(d){
const wr=d.signalReview.filter(s=>s.result===“WIN”).length;
return` ${card("이번 주 내러티브",`<div style="margin-bottom:6px">${d.narrative.tags.map(t=>tg(t,”#ffaa00”)).join(””)}</div><div class="narrative">${d.narrative.summary}</div>`,"#ffaa00")} ${card("주간 성과표",tbl(["코인","시가","종가","고점","저점","주간%"],d.performance.map(p=>[`<b>${p.symbol}</b>`,fp(p.open),fp(p.close),fp(p.high),fp(p.low),`<span style="color:${pc(p.weekPct)};font-weight:700">${fpc(p.weekPct)}</span>`]))+`<div style="margin-top:10px">${barSVG(d.performance,“symbol”,“weekPct”)}</div>`,"#e8e6e3",d.week)} ${card("시그널 회고",tbl(["날짜","코인","시그널","진입","현재","결과","수익"],d.signalReview.map(s=>[s.date,`<b>${s.symbol}</b>`,`<span style=“color:${s.signal===“LONG”?”#00ffa3”:”#ff4466”}”>▲ ${s.signal}</span>`,fp(s.entry),fp(s.current),`<span style=“padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;background:${s.result===“WIN”?”#00ffa318”:”#ff446618”};color:${s.result===“WIN”?”#00ffa3”:”#ff4466”}”>${s.result}</span>`,`<span style="color:${pc(s.pct)};font-weight:600">${fpc(s.pct)}</span>`]))+ibox(`시그널 ${wr}/${d.signalReview.length} 적중.`),wr===d.signalReview.length?"#00ffa3":"#ffaa00",`${wr}/${d.signalReview.length} WIN`)} ${card("섹터 로테이션",`<div style="margin-top:4px">${hbarSVG(d.sectors,“name”,“change”)}</div>${ibox(“AI 섹터 +8.5% 최강. Meme -2.3% 유일 약세.”)}`, "#6c5ce7","주간")} ${card("매크로 캘린더",tbl(["날짜","이벤트","영향도","비고"],d.macroCalendar.map(m=>[m.date,`<b>${m.event}</b>`,`<span style=“color:${m.impact===“상”?”#ff4466”:”#ffaa00”};font-weight:600”>${m.impact}</span>`,`<small style="color:#8a8f98">${m.note}</small>`])),"#ff6b35","다음 주")} ${card("포지션 체크리스트",d.scenarios.map(s=>`<div class="scenario-row"><div class="scenario-sym">${s.symbol}</div><div class="scenario-cols"><div class="bull-box"><div class="box-title">시나리오 A (상승)</div>${s.bullish}</div><div class="bear-box"><div class="box-title">시나리오 B (하락)</div>${s.bearish}</div></div><div class="key-level">핵심 레벨: ${s.keyLevel}</div></div>`).join(""),"#00ffa3","다음 주 준비")} ${card("이번 주 기억할 것 3가지",d.remember.map((r,i)=>`<div class="remember-row"><span class="remember-num">${i+1}</span><span class="remember-txt">${r}</span></div>`).join(””),”#ffaa00”)}

  <div class="footer">이 리포트는 투자 조언이 아닌 시장 구조 분석입니다.</div>`;
}

function render(){document.getElementById(“main”).innerHTML=mode===“daily”?renderDaily(dailyData):renderWeekly(weeklyData);}
function switchMode(m){mode=m;document.querySelectorAll(”.tab”).forEach((t,i)=>t.classList.toggle(“active”,i===(m===“daily”?0:1)));render();}
function updateTs(){document.getElementById(“ts”).textContent=new Date().toLocaleString(“ko-KR”,{timeZone:“Asia/Seoul”});}

async function fetchReport(){
const btn=document.getElementById(“refreshBtn”);
btn.disabled=true;btn.textContent=“검색 중…”;
try{
const isD=mode===“daily”;
const sys=isD
?`You are a crypto data API. Return ONLY valid JSON, no markdown:\n{"date":"YYYY-MM-DD","narrative":{"tags":["#tag1"],"summary":""},"prices":[{"symbol":"BTC","price":0,"change":0,"category":"L1"}],"metrics":{"totalMcap":"","mcapChange":0,"btcD":0,"fng":0,"fngLabel":"","fngStreak":0,"funding":0,"oi":"","oiChange":0,"totalOI":"","totalOIChange":0},"tradfi":[{"label":"","price":"","change":0}],"signals":[{"symbol":"","signal":"LONG","priority":3,"tags":"","interpretation":"","counter":""}],"alerts":[{"target":"","event":"","reason":""}],"liqMap":[{"symbol":"","longLiq":"","shortLiq":""}],"netflow":[{"symbol":"","direction":"","amount":"","meaning":""}],"structure":[{"label":"","value":"","change":0}],"remember":["","",""]}\nWatchlist:BTC,ETH,SOL,XAUT. TradFi:SPX,QQQ,TSLA,KOSPI,Oil.`
:`You are a crypto data API. Return ONLY valid JSON, no markdown:\n{"week":"YYYY-MM-DD ~ MM-DD","narrative":{"tags":[],"summary":""},"performance":[{"symbol":"BTC","open":0,"close":0,"high":0,"low":0,"weekPct":0}],"signalReview":[{"date":"MM-DD","symbol":"","signal":"LONG","entry":0,"current":0,"result":"WIN","pct":0}],"sectors":[{"name":"L1","change":0,"flow":"유입"}],"scenarios":[{"symbol":"","bullish":"","bearish":"","keyLevel":""}],"macroCalendar":[{"date":"","event":"","impact":"상","note":""}],"remember":["","",""]}`;
const res=await fetch(“https://api.anthropic.com/v1/messages”,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:3000,system:sys,tools:[{type:“web_search_20250305”,name:“web_search”}],messages:[{role:“user”,content:isD?“Get today’s crypto market data and return the JSON.”:“Get this week’s crypto market data and return the JSON.”}]})});
const data=await res.json();
const tb=data.content?.find(b=>b.type===“text”);
if(tb?.text){const clean=tb.text.replace(/`json|`/g,””).trim();const parsed=JSON.parse(clean);if(isD)dailyData=parsed;else weeklyData=parsed;updateTs();render();}
}catch(e){console.error(e);}
btn.disabled=false;btn.textContent=“🔄 새로고침”;
}

updateTs();render();
</script>
