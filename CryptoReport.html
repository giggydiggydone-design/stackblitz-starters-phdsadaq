function fp(p) {
  if (p >= 10000) return "$" + Math.round(p).toLocaleString("en-US");
  if (p >= 1) return "$" + p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return "$" + p.toFixed(4);
}
function fpc(p) { return (p >= 0 ? "+" : "") + p.toFixed(1) + "%"; }
function pc(p) { return p > 0 ? "#00ffa3" : p < 0 ? "#ff4466" : "#8a8f98"; }
function gc(v) { return v <= 25 ? "#ff4466" : v <= 50 ? "#ffaa00" : v <= 75 ? "#88cc44" : "#00ffa3"; }

function makeTags(tags, color) {

function makeTable(headers, rows) {
  var ths = "";
  for (var i = 0; i < headers.length; i++) {
    ths += '<th' + (i > 0 ? ' class="r"' : '') + '>' + headers[i] + '</th>';
  }
  var trs = "";
  for (var r = 0; r < rows.length; r++) {
    var row = rows[r];
    var tds = "";
    for (var c = 0; c < row.length; c++) {
      tds += '<td' + (c > 0 ? ' class="r"' : '') + '>' + row[c] + '</td>';
    }
    trs += '<tr>' + tds + '</tr>';
  }
  return '<div class="tbl-wrap"><table><thead><tr>' + ths + '</tr></thead><tbody>' + trs + '</tbody></table></div>';
}

function makeGauge(value, label, streak) {
  var color = gc(value);
  var angle = (value / 100) * 180 - 90;
  var rad = angle * Math.PI / 180;
  var x2 = (60 + 36 * Math.cos(rad)).toFixed(1);
  var y2 = (58 + 36 * Math.sin(rad)).toFixed(1);
  var dash = ((value / 100) * 157).toFixed(1);
  var streakHtml = streak ? '<div class="gauge-str">' + streak + '일 연속</div>' : "";
  return '<div class="gauge-wrap">' +
    '<svg width="120" height="68" viewBox="0 0 120 68">' +
    '<path d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="#1e2028" stroke-width="8" stroke-linecap="round"/>' +
    '<path d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="' + color + '" stroke-width="8" stroke-linecap="round" stroke-dasharray="' + dash + ' 157"/>' +
    '<line x1="60" y1="58" x2="' + x2 + '" y2="' + y2 + '" stroke="#e8e6e3" stroke-width="2" stroke-linecap="round"/>' +
    '<circle cx="60" cy="58" r="3" fill="#e8e6e3"/>' +
    '</svg>' +
    '<div class="gauge-num" style="color:' + color + '">' + value + '</div>' +
    '<div class="gauge-lbl" style="color:' + color + '">' + label + '</div>' +
    streakHtml + '</div>';
}

function barSVG(data) {
  var W = 300, H = 100, n = data.length;
  var max = 0;
  for (var i = 0; i < n; i++) { if (Math.abs(data[i].weekPct) > max) max = Math.abs(data[i].weekPct); }
  if (max === 0) max = 1;
  var bw = Math.floor(W / n) - 6;
  var mid = H / 2;
  var html = '';
  for (var i = 0; i < n; i++) {
    var pct = data[i].weekPct / max;
    var bh = Math.abs(pct) * (mid - 4);
    var x = i * (W / n) + 3;
    var y = pct >= 0 ? mid - bh : mid;
    var color = data[i].weekPct >= 0 ? "#00ffa3" : "#ff4466";
    var lx = (x + bw / 2).toFixed(0);
    html += '<rect x="' + x.toFixed(0) + '" y="' + y.toFixed(0) + '" width="' + bw + '" height="' + bh.toFixed(0) + '" rx="3" fill="' + color + '" opacity=".7"/>';
    html += '<text x="' + lx + '" y="' + (H - 2) + '" text-anchor="middle" fill="#6b7080" font-size="10">' + data[i].symbol + '</text>';
  }
  return '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="overflow:visible">' + html + '<line x1="0" y1="' + mid + '" x2="' + W + '" y2="' + mid + '" stroke="#1e2028" stroke-width="1"/></svg>';
}

function hbarSVG(data) {
  var W = 280, rh = 26, lw = 38, baw = W - lw - 40;
  var max = 0;
  for (var i = 0; i < data.length; i++) { if (Math.abs(data[i].change) > max) max = Math.abs(data[i].change); }
  if (max === 0) max = 1;
  var H = data.length * rh + 8;
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var color = data[i].change >= 0 ? "#00ffa3" : "#ff4466";
    var bw = (Math.abs(data[i].change / max) * baw).toFixed(1);
    var y = i * rh + 4;
    html += '<text x="' + (lw - 4) + '" y="' + (y + 16) + '" text-anchor="end" fill="#c9cdd4" font-size="11">' + data[i].name + '</text>';
    html += '<rect x="' + lw + '" y="' + (y + 6) + '" width="' + bw + '" height="' + (rh - 12) + '" rx="3" fill="' + color + '" opacity=".65"/>';
    html += '<text x="' + (parseFloat(bw) + lw + 4) + '" y="' + (y + 16) + '" fill="' + color + '" font-size="10">' + fpc(data[i].change) + '</text>';
  }
  return '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '">' + html + '</svg>';
}

      var arrow = sig.signal === "LONG" ? "▲" : "▼";
      var starColor = sig.priority >= 3 ? "#ffaa00" : sig.priority >= 2 ? "#00ffa3" : "#8a8f98";
      sigHtml = '<span class="sig-inline" style="color:' + sc + '">' + arrow + ' ' + sig.signal + ' <span style="color:' + starColor + '">' + (STARS[sig.priority] || "☆") + '</span></span>';
    }
    pcards += '<div class="pcard"><div class="pcard-top"><span class="pcard-sym">' + c.symbol + '</span>' + sigHtml + '</div>' +
      '<div class="pcard-price">' + fp(c.price) + '</div>' +
      '<div class="pcard-chg" style="color:' + pc(c.change) + '">' + fpc(c.change) + '</div></div>';
  }

  var metRows = [
    ["총 시총", d.metrics.totalMcap],
    ["BTC.D", d.metrics.btcD + "%"],
    ["BTC 펀딩", '<span style="color:' + (d.metrics.funding < 0 ? "#ff4466" : "#00ffa3") + '">' + d.metrics.funding + '%</span>'],
    ["BTC OI", d.metrics.oi + ' <small style="color:#00ffa3">+' + d.metrics.oiChange + '%</small>'],
    ["총 선물 OI", d.metrics.totalOI + ' <small style="color:#00ffa3">+' + d.metrics.totalOIChange + '%</small>']
  ];

  var tradfiRows = [];
  for (var i = 0; i < d.tradfi.length; i++) {
    var t = d.tradfi[i];
    tradfiRows.push([t.label, t.price, '<span style="color:' + pc(t.change) + ';font-weight:600">' + fpc(t.change) + '</span>']);
  }

  var alertsHtml = "";
  for (var i = 0; i < d.alerts.length; i++) {
    var a = d.alerts[i];
    alertsHtml += '<div class="alert-row"><span class="tag" style="background:rgba(255,68,102,.1);color:#ff4466;border:1px solid rgba(255,68,102,.18);flex-shrink:0">' + a.target + '</span>' +
      '<div><div class="alert-ev">' + a.event + '</div><div class="alert-rs">' + a.reason + '</div></div></div>';
  }

  var liqHtml = "";
  for (var i = 0; i < d.liqMap.length; i++) {
    var l = d.liqMap[i];
    liqHtml += '<div class="liq-blk"><div class="liq-sym">' + l.symbol + '</div>' +
      '<div class="liq-chips"><span class="chip-long">롱청산 ' + l.longLiq + '</span><span class="chip-short">숏청산 ' + l.shortLiq + '</span></div></div>';
  }

  var flowHtml = "";
  for (var i = 0; i < d.netflow.length; i++) {
    var n = d.netflow[i];
    var fc = n.direction === "유출" ? "#00ffa3" : "#ff4466";
    flowHtml += '<div class="flow-row"><div class="flow-top"><span class="flow-sym">' + n.symbol + '</span>' +
      '<span class="flow-amt" style="color:' + fc + '">' + n.amount + '</span></div>' +
      '<div class="flow-sub">' + n.direction + ' → ' + n.meaning + '</div></div>';
  }

  var structHtml = '<div class="struct-grid">';
  for (var i = 0; i < d.structure.length; i++) {
    var s = d.structure[i];
    structHtml += '<div class="struct-item"><div class="struct-lbl">' + s.label + '</div>' +
      '<div class="struct-val">' + s.value + '</div>' +
      '<div class="struct-chg" style="color:' + pc(s.change) + '">' + fpc(s.change) + '</div></div>';
  }
  structHtml += '</div>';

  var signalsHtml = "";
  for (var i = 0; i < d.signals.length; i++) {
    var sig = d.signals[i];
    var sc = sig.signal === "LONG" ? "#00ffa3" : "#ff4466";
    var tagParts = sig.tags.split(" + ");
    var tagsHtml = "";
    for (var j = 0; j < tagParts.length; j++) {
      tagsHtml += '<span class="tag" style="background:#00ffa318;color:#00ffa3;border:1px solid #00ffa330">' + tagParts[j] + '</span>';
    }
    signalsHtml += makeCard(sig.symbol + " 상세분석",
      '<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">' + tagsHtml + '</div>' + ibox(sig.interpretation) + cbox(sig.counter),
      sc, STARS[sig.priority] || "☆");
  }

  var remHtml = "";
  for (var i = 0; i < d.remember.length; i++) {
    remHtml += '<div class="rem-row"><span class="rem-num">' + (i + 1) + '</span><span class="rem-txt">' + d.remember[i] + '</span></div>';
  }

  var parts = [];
  parts.push(makeCard("오늘의 내러티브", '<div style="margin-bottom:6px">' + makeTags(d.narrative.tags, "#ffaa00") + '</div><div class="narrative">' + d.narrative.summary + '</div>', "#ffaa00"));
  parts.push('<div class="pgrid">' + pcards + '</div>');
  parts.push('<div class="two-col">' + makeCard("시장 지표", makeTable(["지표", "값"], metRows), "#e8e6e3", "Market") + makeCard("공포 & 탐욕", makeGauge(d.metrics.fng, d.metrics.fngLabel, d.metrics.fngStreak) + ibox("가격은 40일 고점인데 심리는 극단적 공포. 괴리 해소 시 큰 움직임."), null, "Sentiment") + '</div>');
  parts.push(makeCard("외부 시장", makeTable(["지표", "가격", "변동"], tradfiRows) + ibox("미국 주식 약세인데 BTC 상승 — 드문 디커플링."), "#e8e6e3", "TradFi"));
  parts.push(makeCard("⚠ 이상 감지", alertsHtml, "#ff4466", "Alert"));
  parts.push('<div class="two-col">' + makeCard("청산 지도", liqHtml + ibox("BTC 숏 청산 $75K 집중. 돌파 시 연쇄 가속."), "#ff6b35", "Liquidation") + makeCard("거래소 자금 흐름", flowHtml + ibox("BTC/ETH 순유출. 매도 물량 감소 + ETF 매수 = 상승 압력."), "#4ecdc4", "On-chain") + '</div>');
  parts.push(signalsHtml);
  parts.push(makeCard("시장 구조", structHtml + ibox("USDT.D -1.58% 핵심. 현금→코인 자금 이동 중."), "#6c5ce7", "상급자용"));
  parts.push(makeCard("오늘 기억할 것 3가지", remHtml, "#ffaa00"));
  parts.push('<div class="footer">이 리포트는 투자 조언이 아닌 시장 구조 분석입니다.</div>');
  return parts.join("");
}

function renderWeekly(d) {
  var wr = 0;
  for (var i = 0; i < d.signalReview.length; i++) { if (d.signalReview[i].result === "WIN") wr++; }

  var perfRows = [];
  for (var i = 0; i < d.performance.length; i++) {
    var p = d.performance[i];
    perfRows.push(['<strong>' + p.symbol + '</strong>', fp(p.open), fp(p.close), fp(p.high), fp(p.low), '<span style="color:' + pc(p.weekPct) + ';font-weight:700">' + fpc(p.weekPct) + '</span>']);
  }

  var sigRows = [];
  for (var i = 0; i < d.signalReview.length; i++) {
    var s = d.signalReview[i];
    var rc = s.result === "WIN" ? "#00ffa3" : "#ff4466";
    var rbg = s.result === "WIN" ? "rgba(0,255,163,.1)" : "rgba(255,68,102,.1)";
    sigRows.push([s.date, '<strong>' + s.symbol + '</strong>',
      '<span style="color:' + (s.signal === "LONG" ? "#00ffa3" : "#ff4466") + '">▲ ' + s.signal + '</span>',
      fp(s.entry), fp(s.current),
      '<span style="padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;background:' + rbg + ';color:' + rc + '">' + s.result + '</span>',
      '<span style="color:' + pc(s.pct) + ';font-weight:600">' + fpc(s.pct) + '</span>']);
  }

  var macroRows = [];
  for (var i = 0; i < d.macroCalendar.length; i++) {
    var m = d.macroCalendar[i];
    macroRows.push([m.date, '<strong>' + m.event + '</strong>',
      '<span style="color:' + (m.impact === "상" ? "#ff4466" : "#ffaa00") + ';font-weight:600">' + m.impact + '</span>',
      '<small style="color:#8a8f98">' + m.note + '</small>']);
  }

  var scenHtml = "";
  for (var i = 0; i < d.scenarios.length; i++) {
    var s = d.scenarios[i];
    scenHtml += '<div class="scen-row"><div class="scen-sym">' + s.symbol + '</div>' +
      '<div class="scen-cols"><div class="bull-box"><div class="box-ttl">시나리오 A (상승)</div>' + s.bullish + '</div>' +
      '<div class="bear-box"><div class="box-ttl">시나리오 B (하락)</div>' + s.bearish + '</div></div>' +
      '<div class="key-lv">핵심 레벨: ' + s.keyLevel + '</div></div>';
  }

  var remHtml = "";
  for (var i = 0; i < d.remember.length; i++) {
    remHtml += '<div class="rem-row"><span class="rem-num">' + (i + 1) + '</span><span class="rem-txt">' + d.remember[i] + '</span></div>';
  }

  var winColor = wr === d.signalReview.length ? "#00ffa3" : "#ffaa00";
  var parts = [];
  parts.push(makeCard("이번 주 내러티브", '<div style="margin-bottom:6px">' + makeTags(d.narrative.tags, "#ffaa00") + '</div><div class="narrative">' + d.narrative.summary + '</div>', "#ffaa00"));
  parts.push(makeCard("주간 성과표", makeTable(["코인", "시가", "종가", "고점", "저점", "주간%"], perfRows) + '<div style="margin-top:10px">' + barSVG(d.performance) + '</div>', "#e8e6e3", d.week));
  parts.push(makeCard("시그널 회고", makeTable(["날짜", "코인", "시그널", "진입", "현재", "결과", "수익"], sigRows) + ibox("시그널 " + wr + "/" + d.signalReview.length + " 적중. 극단적 공포 구간 롱 시그널 전체 WIN."), winColor, wr + "/" + d.signalReview.length + " WIN"));
  parts.push(makeCard("섹터 로테이션", '<div style="margin-top:4px">' + hbarSVG(d.sectors) + '</div>' + ibox("AI 섹터 +8.5% 최강. Meme -2.3% 유일 약세."), "#6c5ce7", "주간"));
  parts.push(makeCard("매크로 캘린더", makeTable(["날짜", "이벤트", "영향도", "비고"], macroRows), "#ff6b35", "다음 주"));
  parts.push(makeCard("포지션 체크리스트", scenHtml, "#00ffa3", "다음 주 준비"));
  parts.push(makeCard("이번 주 기억할 것 3가지", remHtml, "#ffaa00"));
  parts.push('<div class="footer">이 리포트는 투자 조언이 아닌 시장 구조 분석입니다.</div>');
  return parts.join("");
}

function render() {
  var el = document.getElementById("main");
  if (!el) return;
  try {
    el.innerHTML = currentMode === "daily" ? renderDaily(dailyData) : renderWeekly(weeklyData);
  } catch(e) {
    el.innerHTML = '<div style="padding:20px;color:#ff4466">렌더링 오류: ' + e.message + '</div>';
  }
}

function switchMode(m) {
  currentMode = m;
  document.getElementById("tab-daily").className = m === "daily" ? "tab on" : "tab";
  document.getElementById("tab-weekly").className = m === "weekly" ? "tab on" : "tab";
  render();
}

function updateTs() {
  var el = document.getElementById("ts");
  if (el) el.textContent = new Date().toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
}

async function fetchReport() {
  var btn = document.getElementById("btnR");
  btn.disabled = true;
  btn.textContent = "검색 중...";
  try {
    var isD = currentMode === "daily";
    var sys = isD
      ? 'You are a crypto data API. Return ONLY valid JSON, no markdown, no backticks. Schema: {"date":"YYYY-MM-DD","narrative":{"tags":["#tag1"],"summary":""},"prices":[{"symbol":"BTC","price":0,"change":0}],"metrics":{"totalMcap":"","btcD":0,"fng":0,"fngLabel":"","fngStreak":0,"funding":0,"oi":"","oiChange":0,"totalOI":"","totalOIChange":0},"tradfi":[{"label":"","price":"","change":0}],"signals":[{"symbol":"","signal":"LONG","priority":3,"tags":"","interpretation":"","counter":""}],"alerts":[{"target":"","event":"","reason":""}],"liqMap":[{"symbol":"","longLiq":"","shortLiq":""}],"netflow":[{"symbol":"","direction":"","amount":"","meaning":""}],"structure":[{"label":"","value":"","change":0}],"remember":["","",""]}'
      : 'You are a crypto data API. Return ONLY valid JSON, no markdown, no backticks. Schema: {"week":"YYYY-MM-DD ~ MM-DD","narrative":{"tags":[],"summary":""},"performance":[{"symbol":"BTC","open":0,"close":0,"high":0,"low":0,"weekPct":0}],"signalReview":[{"date":"MM-DD","symbol":"","signal":"LONG","entry":0,"current":0,"result":"WIN","pct":0}],"sectors":[{"name":"","change":0}],"scenarios":[{"symbol":"","bullish":"","bearish":"","keyLevel":""}],"macroCalendar":[{"date":"","event":"","impact":"상","note":""}],"remember":["","",""]}';

    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 3000,
        system: sys,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: isD ? "Get today's crypto market data and return the JSON." : "Get this week's crypto market data and return the JSON." }]
      })
    });
    var data = await res.json();
    var textBlock = null;
    if (data.content) {
      for (var i = 0; i < data.content.length; i++) {
        if (data.content[i].type === "text") { textBlock = data.content[i]; break; }
      }
    }
    if (textBlock && textBlock.text) {
      var clean = textBlock.text.replace(/```json/g, "").replace(/```/g, "").trim();
      var parsed = JSON.parse(clean);
      if (isD) dailyData = parsed; else weeklyData = parsed;
      updateTs();
      render();
    }
  } catch(e) {
    console.error(e);
  }
  btn.disabled = false;
  btn.textContent = "🔄 새로고침";
}

updateTs();
render();
</script>
