function fp(p) {
  if (p >= 10000) return "$" + Math.round(p).toLocaleString("en-US");
  if (p >= 1) return "$" + p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return "$" + p.toFixed(4);
}
function fpc(p) { return (p >= 0 ? "+" : "") + p.toFixed(1) + "%"; }
function pc(p) { return p > 0 ? "#00ffa3" : p < 0 ? "#ff4466" : "#8a8f98"; }
function gc(v) { return v <= 25 ? "#ff4466" : v <= 50 ? "#ffaa00" : v <= 75 ? "#88cc44" : "#00ffa3"; }

function makeTags(tags, color) {
  var html = "";
  for (var i = 0; i < tags.length; i++) {
    html += '<span class="tag" style="background:' + color + '18;color:' + color + ';border:1px solid ' + color + '30">' + tags[i] + '</span>';
  }
  return html;
}

function makeCard(title, content, accent, badge) {
  var ac = accent || "#e8e6e3";
  var bdgHtml = badge ? '<div class="bdg">' + badge + '</div>' : "";
  return '<div class="card"><div class="card-hd"><div class="card-title" style="color:' + ac + '">' + title + '</div>' + bdgHtml + '</div>' + content + '</div>';
}

function ibox(label, txt) {
  return '<div class="ibox"><div class="ibox-title">💡 ' + label + '</div>' + txt + '</div>';
}
function cbox(txt) {
  return '<div class="cbox"><div class="cbox-title">⚠ 반대 시나리오 — 틀리려면?</div>' + txt + '</div>';
}

function makeTable(headers, rows) {
  var ths = "";
  for (var i = 0; i < headers.length; i++) {
    var cls = (i > 0 && headers[i] !== "이게 뭔데?") ? ' class="r"' : '';
    ths += '<th' + cls + '>' + headers[i] + '</th>';
  }
  var trs = "";
  for (var r = 0; r < rows.length; r++) {
    var row = rows[r];
    var tds = "";
    for (var c = 0; c < row.length; c++) {
      var isHint = (headers[c] === "이게 뭔데?");
      var isRight = (c > 0 && !isHint);
      var cls = isHint ? ' class="hint"' : (isRight ? ' class="r"' : '');
      tds += '<td' + cls + '>' + row[c] + '</td>';
    }
    trs += '<tr>' + tds + '</tr>';
  }
  return '<div class="tbl-wrap"><table><thead><tr>' + ths + '</tr></thead><tbody>' + trs + '</tbody></table></div>';
}

function makeGauge(value, label, streak) {
  var color = gc(value);
  var angle = (value / 100) * 180 - 90;
  var rad = angle * Math.PI / 180;
  var x2 = (60 + 36 * Math.cos(rad)).toFixed(1);
  var y2 = (58 + 36 * Math.sin(rad)).toFixed(1);
  var dash = ((value / 100) * 157).toFixed(1);
  var streakHtml = streak ? '<div class="gauge-str">' + streak + '일 연속</div>' : "";
  return '<div class="gauge-wrap">' +
    '<svg width="120" height="68" viewBox="0 0 120 68">' +
    '<path d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="#1e2028" stroke-width="8" stroke-linecap="round"/>' +
    '<path d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="' + color + '" stroke-width="8" stroke-linecap="round" stroke-dasharray="' + dash + ' 157"/>' +
    '<line x1="60" y1="58" x2="' + x2 + '" y2="' + y2 + '" stroke="#e8e6e3" stroke-width="2" stroke-linecap="round"/>' +
    '<circle cx="60" cy="58" r="3" fill="#e8e6e3"/>' +
    '</svg>' +
    '<div class="gauge-num" style="color:' + color + '">' + value + '</div>' +
    '<div class="gauge-lbl" style="color:' + color + '">' + label + '</div>' +
    streakHtml + '</div>';
}

function barSVG(data) {
  var W = 300, H = 100, n = data.length;
  var max = 0;
  for (var i = 0; i < n; i++) { if (Math.abs(data[i].weekPct) > max) max = Math.abs(data[i].weekPct); }
  if (max === 0) max = 1;
  var bw = Math.floor(W / n) - 6;
  var mid = H / 2;
  var html = '';
  for (var i = 0; i < n; i++) {
    var pct = data[i].weekPct / max;
    var bh = Math.abs(pct) * (mid - 4);
    var x = i * (W / n) + 3;
    var y = pct >= 0 ? mid - bh : mid;
    var color = data[i].weekPct >= 0 ? "#00ffa3" : "#ff4466";
    var lx = (x + bw / 2).toFixed(0);
    html += '<rect x="' + x.toFixed(0) + '" y="' + y.toFixed(0) + '" width="' + bw + '" height="' + bh.toFixed(0) + '" rx="3" fill="' + color + '" opacity=".7"/>';
    html += '<text x="' + lx + '" y="' + (H - 2) + '" text-anchor="middle" fill="#6b7080" font-size="10">' + data[i].symbol + '</text>';
  }
  return '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="overflow:visible">' + html + '<line x1="0" y1="' + mid + '" x2="' + W + '" y2="' + mid + '" stroke="#1e2028" stroke-width="1"/></svg>';
}

function hbarSVG(data) {
  var W = 280, rh = 26, lw = 38, baw = W - lw - 40;
  var max = 0;
  for (var i = 0; i < data.length; i++) { if (Math.abs(data[i].change) > max) max = Math.abs(data[i].change); }
  if (max === 0) max = 1;
  var H = data.length * rh + 8;
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var color = data[i].change >= 0 ? "#00ffa3" : "#ff4466";
    var bw = (Math.abs(data[i].change / max) * baw).toFixed(1);
    var y = i * rh + 4;
    html += '<text x="' + (lw - 4) + '" y="' + (y + 16) + '" text-anchor="end" fill="#c9cdd4" font-size="11">' + data[i].name + '</text>';
    html += '<rect x="' + lw + '" y="' + (y + 6) + '" width="' + bw + '" height="' + (rh - 12) + '" rx="3" fill="' + color + '" opacity=".65"/>';
    html += '<text x="' + (parseFloat(bw) + lw + 4) + '" y="' + (y + 16) + '" fill="' + color + '" font-size="10">' + fpc(data[i].change) + '</text>';
  }
  return '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '">' + html + '</svg>';
}

    liqHtml += '<div class="liq-blk">' +
      '<div class="liq-sym">' + l.symbol + '</div>' +
      '<div class="liq-chips">' +
      '<span class="chip-long">📉 롱 청산 ' + l.longLiq + '</span>' +
      '<span class="chip-short">📈 숏 청산 ' + l.shortLiq + '</span></div>' +
      '<div class="liq-explain">하락 시 롱 청산 → ' + l.longExplain + '</div>' +
      '<div class="liq-explain" style="margin-top:2px">돌파 시 숏 청산 → ' + l.shortExplain + '</div></div>';
  }
  var liqCard = makeCard("청산 지도", liqHtml + ibox("해석", d.liqInterpret), "#ff6b35", "Liquidation");

  // 8. 거래소 자금 흐름
  var flowHtml = "";
  for (var i = 0; i < d.netflow.length; i++) {
    var n = d.netflow[i];
    var fc = n.direction === "유출" ? "#00ffa3" : "#ff4466";
    flowHtml += '<div class="flow-row">' +
      '<div class="flow-top"><span class="flow-sym">' + n.symbol + '</span>' +
      '<span class="flow-amt" style="color:' + fc + '">' + (n.direction === "유출" ? "↑ 유출 " : "↓ 유입 ") + n.amount + '</span></div>' +
      '<div class="flow-sub">' + n.meaning + '</div>' +
      '<div class="flow-meaning">' + n.interpret + '</div></div>';
  }
  var flowCard = makeCard("거래소 자금 흐름", flowHtml + ibox("해석", d.flowInterpret), "#4ecdc4", "On-chain");

  // 9. 상세 분석
  var signalsHtml = "";
  for (var i = 0; i < d.signals.length; i++) {
    var sig = d.signals[i];
    var sc = sig.signal === "LONG" ? "#00ffa3" : "#ff4466";
    var factorsHtml = '<div class="sig-detail-block">';
    for (var j = 0; j < sig.factors.length; j++) {
      factorsHtml += '<div class="sig-detail-row">' +
        '<div class="sig-factor-lbl">' + sig.factors[j].label + '</div>' +
        '<div class="sig-factor-val">' + sig.factors[j].detail + '</div></div>';
    }
    factorsHtml += '</div>';
    signalsHtml += makeCard(sig.symbol + " 상세분석",
      factorsHtml + ibox("종합 해석", sig.interpretation) + cbox(sig.counter),
      sc, STARS[sig.priority] || "☆");
  }

  // 10. 시장 구조
  var structHtml = '<div class="struct-grid">';
  for (var i = 0; i < d.structure.length; i++) {
    var s = d.structure[i];
    structHtml += '<div class="struct-item"><div class="struct-lbl">' + s.label + '</div>' +
      '<div class="struct-val">' + s.value + '</div>' +
      '<div class="struct-chg" style="color:' + pc(s.change) + '">' + fpc(s.change) + '</div>' +
      '<div class="struct-hint">' + s.hint + '</div></div>';
  }
  structHtml += '</div>';
  var structCard = makeCard("시장 구조 모니터", structHtml + ibox("해석", d.structInterpret), "#6c5ce7", "상급자용");

  // 11. 핵심 이벤트
  var eventsHtml = "";
  for (var i = 0; i < d.events.length; i++) {
    var ev = d.events[i];
    eventsHtml += '<div class="event-row"><div class="event-date">' + ev.date + '</div>' +
      '<div class="event-name">' + ev.name + '</div>' +
      '<div class="event-impact">' + ev.impact + '</div></div>';
  }
  var eventsCard = makeCard("핵심 이벤트", eventsHtml, "#ff6b35", "캘린더");

  // 12. 기억할 것 3가지
  var remHtml = "";
  for (var i = 0; i < d.remember.length; i++) {
    var r = d.remember[i];
    remHtml += '<div class="rem-row"><span class="rem-num">' + (i + 1) + '</span>' +
      '<div class="rem-body"><div class="rem-txt">' + r.title + '</div><div class="rem-sub">' + r.sub + '</div></div></div>';
  }
  var remCard = makeCard("오늘 기억할 것 3가지", remHtml, "#ffaa00");

  var parts = [];
  parts.push(narrativeHtml);
  parts.push('<div class="pgrid">' + pcards + '</div>');
  parts.push(metricsHtml);
  parts.push(tradfiHtml);
  parts.push(watchlistHtml);
  parts.push(alertCard);
  parts.push(liqCard);
  parts.push(flowCard);
  parts.push(signalsHtml);
  parts.push(structCard);
  parts.push(eventsCard);
  parts.push(remCard);
  parts.push('<div class="footer">이 리포트는 투자 조언이 아닌 시장 구조 분석입니다.<br>모든 투자 결정과 결과의 책임은 본인에게 있습니다.</div>');
  return parts.join("");
}

function renderWeekly(d) {
  var wr = 0;
  for (var i = 0; i < d.signalReview.length; i++) { if (d.signalReview[i].result === "WIN") wr++; }

  var narrativeHtml = makeCard("이번 주 내러티브",
    '<div style="margin-bottom:8px">' + makeTags(d.narrative.tags, "#ffaa00") + '</div>' +
    '<div class="narrative">' + d.narrative.summary + '</div>' +
    '<div style="margin-top:8px;padding:8px 12px;background:#0d1117;border-radius:6px;font-size:12px;color:#8a8f98;line-height:1.6">' + d.narrative.context + '</div>',
    "#ffaa00");

  var perfRows = [];
  for (var i = 0; i < d.performance.length; i++) {
    var p = d.performance[i];
    perfRows.push(['<strong>' + p.symbol + '</strong>', fp(p.open), fp(p.close), fp(p.high), fp(p.low),
      '<span style="color:' + pc(p.weekPct) + ';font-weight:700">' + fpc(p.weekPct) + '</span>']);
  }

  var sigRows = [];
  for (var i = 0; i < d.signalReview.length; i++) {
    var s = d.signalReview[i];
    var rc = s.result === "WIN" ? "#00ffa3" : "#ff4466";
    var rbg = s.result === "WIN" ? "rgba(0,255,163,.1)" : "rgba(255,68,102,.1)";
    sigRows.push([s.date, '<strong>' + s.symbol + '</strong>',
      '<span style="color:' + (s.signal === "LONG" ? "#00ffa3" : "#ff4466") + '">▲ ' + s.signal + '</span>',
      fp(s.entry), fp(s.current),
      '<span style="padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;background:' + rbg + ';color:' + rc + '">' + s.result + '</span>',
      '<span style="color:' + pc(s.pct) + ';font-weight:600">' + fpc(s.pct) + '</span>']);
  }

  var macroRows = [];
  for (var i = 0; i < d.macroCalendar.length; i++) {
    var m = d.macroCalendar[i];
    macroRows.push([m.date, '<strong>' + m.event + '</strong>',
      '<span style="color:' + (m.impact === "상" ? "#ff4466" : "#ffaa00") + ';font-weight:600">' + m.impact + '</span>',
      '<small style="color:#8a8f98">' + m.note + '</small>']);
  }

  var scenHtml = "";
  for (var i = 0; i < d.scenarios.length; i++) {
    var s = d.scenarios[i];
    scenHtml += '<div class="scen-row"><div class="scen-sym">' + s.symbol + '</div>' +
      '<div class="scen-cols"><div class="bull-box"><div class="box-ttl">📈 상승 시나리오</div>' + s.bullish + '</div>' +
      '<div class="bear-box"><div class="box-ttl">📉 하락 시나리오</div>' + s.bearish + '</div></div>' +
      '<div class="key-lv" style="margin-top:4px">핵심 레벨: ' + s.keyLevel + '</div></div>';
  }

  var remHtml = "";
  for (var i = 0; i < d.remember.length; i++) {
    var r = d.remember[i];
    remHtml += '<div class="rem-row"><span class="rem-num">' + (i + 1) + '</span>' +
      '<div class="rem-body"><div class="rem-txt">' + r.title + '</div><div class="rem-sub">' + r.sub + '</div></div></div>';
  }

  var winColor = wr === d.signalReview.length ? "#00ffa3" : "#ffaa00";
  var parts = [];
  parts.push(narrativeHtml);
  parts.push(makeCard("주간 성과표",
    makeTable(["코인", "시가", "종가", "고점", "저점", "주간%"], perfRows) +
    '<div style="margin-top:10px">' + barSVG(d.performance) + '</div>',
    "#e8e6e3", d.week));
  parts.push(makeCard("시그널 회고",
    makeTable(["날짜", "코인", "시그널", "진입", "현재", "결과", "수익"], sigRows) +
    ibox("해석", "시그널 " + wr + "/" + d.signalReview.length + " 적중. 극단적 공포 구간에서의 롱 시그널이 전부 맞았다. 감정과 반대로 움직이는 구조적 접근의 효과."),
    winColor, wr + "/" + d.signalReview.length + " WIN"));
  parts.push(makeCard("섹터 로테이션",
    '<div style="margin-top:4px">' + hbarSVG(d.sectors) + '</div>' + ibox("해석", d.sectorInterpret),
    "#6c5ce7", "주간"));
  parts.push(makeCard("다음 주 시나리오", scenHtml, "#00ffa3", "포지션 준비"));
  parts.push(makeCard("매크로 캘린더", makeTable(["날짜", "이벤트", "영향도", "비고"], macroRows), "#ff6b35", "다음 주"));
  parts.push(makeCard("이번 주 기억할 것 3가지", remHtml, "#ffaa00"));
  parts.push('<div class="footer">이 리포트는 투자 조언이 아닌 시장 구조 분석입니다.<br>모든 투자 결정과 결과의 책임은 본인에게 있습니다.</div>');
  return parts.join("");
}

function render() {
  var el = document.getElementById("main");
  if (!el) return;
  try {
    el.innerHTML = currentMode === "daily" ? renderDaily(dailyData) : renderWeekly(weeklyData);
  } catch(e) {
    el.innerHTML = '<div style="padding:20px;color:#ff4466">렌더링 오류: ' + e.message + '</div>';
  }
}

function switchMode(m) {
  currentMode = m;
  document.getElementById("tab-daily").className = m === "daily" ? "tab on" : "tab";
  document.getElementById("tab-weekly").className = m === "weekly" ? "tab on" : "tab";
  render();
}

function updateTs() {
  var el = document.getElementById("ts");
  if (el) el.textContent = new Date().toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
}

async function fetchReport() {
  var btn = document.getElementById("btnR");
  btn.disabled = true;
  btn.textContent = "검색 중...";
  try {
    var isD = currentMode === "daily";
    var sys = isD
      ? 'You are a Korean crypto market analyst. Return ONLY valid JSON, no markdown, no backticks. Use web search to get real data. Schema (all Korean text, except technical terms like ETF/OI/FOMC/BTC/ETH): {"date":"YYYY-MM-DD","narrative":{"tags":["#tag1","#tag2"],"summary":"2-sentence story of the day in Korean","context":"beginner-friendly 1-sentence explanation"},"prices":[{"symbol":"BTC","price":0,"change":0,"hint":"one-line Korean description"}],"metrics":{"totalMcap":"","btcD":0,"fng":0,"fngLabel":"","fngStreak":0,"funding":0,"oi":"","oiChange":0,"totalOI":"","totalOIChange":0},"tradfi":[{"label":"","price":"","change":0,"hint":""}],"tradfiInterpret":"causal chain interpretation in Korean","watchlist":[{"symbol":"","stars":"★★★","signal":"LONG","reason":""}],"alerts":[{"target":"","event":"","reason":"","why":"beginner explanation"}],"liqMap":[{"symbol":"","longLiq":"","shortLiq":"","longExplain":"","shortExplain":""}],"liqInterpret":"","netflow":[{"symbol":"","direction":"유출","amount":"","meaning":"","interpret":""}],"flowInterpret":"","signals":[{"symbol":"","signal":"LONG","priority":3,"factors":[{"label":"","detail":""}],"interpretation":"","counter":""}],"structure":[{"label":"","value":"","change":0,"hint":""}],"structInterpret":"","events":[{"date":"","name":"","impact":""}],"remember":[{"title":"","sub":""}]}'
      : 'You are a Korean crypto market analyst. Return ONLY valid JSON, no markdown, no backticks. Schema: {"week":"YYYY-MM-DD ~ MM-DD","narrative":{"tags":[],"summary":"","context":""},"performance":[{"symbol":"BTC","open":0,"close":0,"high":0,"low":0,"weekPct":0}],"signalReview":[{"date":"MM-DD","symbol":"","signal":"LONG","entry":0,"current":0,"result":"WIN","pct":0}],"sectors":[{"name":"","change":0}],"sectorInterpret":"","scenarios":[{"symbol":"","bullish":"","bearish":"","keyLevel":""}],"macroCalendar":[{"date":"","event":"","impact":"상","note":""}],"remember":[{"title":"","sub":""}]}';

    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        system: sys,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: isD ? "Search for today's crypto market data (BTC, ETH, SOL, XAUT prices, Fear & Greed, funding rates, OI, ETF flows, liquidation data, exchange netflow, SPX, QQQ, KOSPI, oil) and return the complete JSON report." : "Search for this week's crypto market data and return the complete weekly JSON report." }]
      })
    });
    var data = await res.json();
    var textBlock = null;
    if (data.content) {
      for (var i = 0; i < data.content.length; i++) {
        if (data.content[i].type === "text") { textBlock = data.content[i]; break; }
      }
    }
    if (textBlock && textBlock.text) {
      var clean = textBlock.text.replace(/```json/g, "").replace(/```/g, "").trim();
      var parsed = JSON.parse(clean);
      if (isD) dailyData = parsed; else weeklyData = parsed;
      updateTs();
      render();
    }
  } catch(e) {
    console.error(e);
  }
  btn.disabled = false;
  btn.textContent = "🔄 새로고침";
}

updateTs();
render();
</script>
