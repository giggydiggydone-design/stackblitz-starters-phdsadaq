<header>
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
    <div class="logo"><span class="logo-dot">◆</span> CRYPTO REPORT<span class="live-dot"></span></div>
    <div class="ts" id="ts">--</div>
  </div>
  <div class="hright">
    <div class="tabs">
      <button class="tab on" id="tab-daily" onclick="switchMode('daily')">데일리</button>
      <button class="tab" id="tab-weekly" onclick="switchMode('weekly')">주간</button>
    </div>
    <button class="btn-refresh" id="btnR" onclick="fetchFullReport()">🔄 AI 분석</button>
  </div>
</header>

<div id="main"><div class="loading-bar">BINANCE 실시간 데이터 로딩 중</div></div>

<script>
// ═══════════════════════════════════════════════════════════
// BINANCE PUBLIC API — NO KEY REQUIRED
// ═══════════════════════════════════════════════════════════
const BN="https://api.binance.com/api/v3";
const BNF="https://fapi.binance.com/fapi/v1";
const SYMBOLS={BTC:"BTCUSDT",ETH:"ETHUSDT",SOL:"SOLUSDT",BNB:"BNBUSDT",XRP:"XRPUSDT",ADA:"ADAUSDT",DOGE:"DOGEUSDT",AVAX:"AVAXUSDT",LINK:"LINKUSDT",DOT:"DOTUSDT"};
const HINTS={BTC:"비트코인. 암호화폐 시장의 기준점.",ETH:"이더리움. 스마트 컨트랙트 플랫폼.",SOL:"솔라나. 고속 저비용 블록체인.",BNB:"바이낸스 코인. 거래소 토큰.",XRP:"리플. 국제 송금 특화.",ADA:"카르다노. 학술 연구 기반 블록체인.",DOGE:"도지코인. 밈 코인 대표.",AVAX:"아발란체. 서브넷 기반 확장.",LINK:"체인링크. 오라클 네트워크.",DOT:"폴카닷. 멀티체인 인프라."};

var currentMode="daily";
var liveData={prices:[],metrics:{},fundingRates:{},status:[]};

function log(msg,ok){liveData.status.push({msg:msg,ok:ok});updateStatus();}
function updateStatus(){
  var el=document.getElementById("statusBar");if(!el)return;
  el.innerHTML=liveData.status.map(function(s){return'<span class="'+(s.ok?"status-ok":"status-err")+'">'+(s.ok?"✓":"✗")+' '+s.msg+'</span>';}).join("");
}

// Fetch 24h tickers
async function fetchPrices(){
  try{
    var res=await fetch(BN+"/ticker/24hr");
    var all=await res.json();
    var prices=[];
    var syms=Object.keys(SYMBOLS);
    for(var i=0;i<syms.length;i++){
      var sym=syms[i],pair=SYMBOLS[sym];
      for(var j=0;j<all.length;j++){
        if(all[j].symbol===pair){
          prices.push({symbol:sym,price:parseFloat(all[j].lastPrice),change:parseFloat(all[j].priceChangePercent),hint:HINTS[sym]||"",volume:parseFloat(all[j].quoteVolume)});
          break;
        }
      }
    }
    liveData.prices=prices;
    log("가격 데이터",true);
    return prices;
  }catch(e){log("가격 로드 실패",false);return[];}
}

// Fetch BTC funding rate
async function fetchFunding(){
  try{
    var res=await fetch(BNF+"/premiumIndex?symbol=BTCUSDT");
    var d=await res.json();
    liveData.metrics.funding=(parseFloat(d.lastFundingRate)*100).toFixed(4);
    log("펀딩비율",true);
  }catch(e){liveData.metrics.funding="N/A";log("펀딩비율 실패",false);}
}

// Fetch Open Interest
async function fetchOI(){
  try{
    var res=await fetch(BNF+"/openInterest?symbol=BTCUSDT");
    var d=await res.json();
    var oiBtc=parseFloat(d.openInterest);
    liveData.metrics.oi=oiBtc.toLocaleString("en",{maximumFractionDigits:0})+" BTC";
    log("미결제약정",true);
  }catch(e){liveData.metrics.oi="N/A";log("OI 실패",false);}
}

// Fetch Fear & Greed
async function fetchFNG(){
  try{
    var res=await fetch("https://api.alternative.me/fng/?limit=1");
    var d=await res.json();
    var val=parseInt(d.data[0].value);
    var cls=d.data[0].value_classification;
    liveData.metrics.fng=val;
    liveData.metrics.fngLabel=cls;
    log("공포탐욕지수",true);
  }catch(e){liveData.metrics.fng=0;liveData.metrics.fngLabel="N/A";log("FNG 실패",false);}
}

// ═══════════════════════════════════════════════════════════
// BUILD REPORT DATA FROM LIVE
// ═══════════════════════════════════════════════════════════
function buildDailyFromLive(){
  var p=liveData.prices;
  var m=liveData.metrics;
  var btc=p.find(function(x){return x.symbol==="BTC";})||{price:0,change:0};
  var eth=p.find(function(x){return x.symbol==="ETH";})||{price:0,change:0};

  // Auto-generate basic narrative
  var topGainer=p.slice().sort(function(a,b){return b.change-a.change;})[0]||{symbol:"?",change:0};
  var topLoser=p.slice().sort(function(a,b){return a.change-b.change;})[0]||{symbol:"?",change:0};
  var tags=[];
  if(btc.change>3)tags.push("#BTC급등");
  else if(btc.change<-3)tags.push("#BTC급락");
  if(m.fng<=25)tags.push("#극단공포");
  if(m.fng>=75)tags.push("#극단탐욕");
  if(parseFloat(m.funding)<0)tags.push("#네거티브펀딩");
  if(tags.length===0)tags.push("#시장관찰");

  var summary=topGainer.symbol+"이 "+topGainer.change.toFixed(1)+"% 상승으로 가장 강했고, "+topLoser.symbol+"은 "+topLoser.change.toFixed(1)+"%로 가장 약했다. ";
  if(m.fng<=25)summary+="공포탐욕지수 "+m.fng+"으로 극단적 공포 구간 지속 중.";
  else if(m.fng>=75)summary+="공포탐욕지수 "+m.fng+"으로 탐욕 구간.";
  else summary+="공포탐욕지수 "+m.fng+" — "+m.fngLabel+".";

  var context="실시간 바이낸스 데이터 기준. AI 분석 버튼을 누르면 심층 분석이 생성됩니다.";

  // Watchlist auto-generate
  var wl=p.slice(0,6).map(function(c){
    var stars=Math.abs(c.change)>5?"★★★":Math.abs(c.change)>2?"★★":Math.abs(c.change)>1?"★":"☆";
    var signal=c.change>2?"LONG":c.change<-2?"SHORT":"중립";
    var reason="24h "+c.change.toFixed(1)+"%. "+(c.change>0?"상승 모멘텀.":"하락 압력.");
    return{symbol:c.symbol,stars:stars,signal:signal,reason:reason};
  });

  return{
    date:new Date().toISOString().slice(0,10),
    narrative:{tags:tags,summary:summary,context:context},
    prices:p.slice(0,6),
    metrics:{
      totalMcap:"—",mcapChange:0,
      btcD:"—",
      fng:m.fng||0,fngLabel:m.fngLabel||"N/A",fngStreak:0,
      funding:m.funding||"N/A",
      oi:m.oi||"N/A",oiChange:0,
      totalOI:"—",totalOIChange:0
    },
    tradfi:[
      {label:"S&P 500",price:"—",change:0,hint:"AI 분석 시 자동 업데이트"},
      {label:"QQQ",price:"—",change:0,hint:"AI 분석 시 자동 업데이트"}
    ],
    tradfiInterpret:"AI 분석 버튼을 누르면 TradFi 데이터가 자동으로 채워집니다.",
    watchlist:wl,
    alerts:[{target:"시스템",event:"실시간 데이터 로드 완료",reason:"바이낸스 API 연결 성공",why:"가격, 펀딩비율, OI, 공포탐욕지수가 실시간으로 반영되고 있습니다. 더 깊은 분석은 AI 분석 버튼을 누르세요."}],
    liqMap:[],liqInterpret:"AI 분석 시 자동 생성",
    netflow:[],flowInterpret:"AI 분석 시 자동 생성",
    signals:[],
    structure:[],structInterpret:"",
    events:[],
    remember:[
      {title:topGainer.symbol+" 24h "+topGainer.change.toFixed(1)+"%로 최강",sub:"상위 코인 중 가장 강한 모멘텀."},
      {title:"BTC 펀딩비율 "+m.funding+"%",sub:parseFloat(m.funding)<0?"네거티브 펀딩 = 숏 과밀. 숏스퀴즈 가능성 주시.":"양수 펀딩 = 롱 포지션 다수."},
      {title:"공포탐욕 "+m.fng+" ("+m.fngLabel+")",sub:m.fng<=25?"극단 공포 구간은 역사적 매수 기회였으나, 바닥 시점은 예측 불가.":"현재 시장 센티먼트 반영."}
    ]
  };
}

// ═══════════════════════════════════════════════════════════
// RENDER FUNCTIONS (same as original, simplified)
// ═══════════════════════════════════════════════════════════
var dailyData=null,weeklyData=null;
var STARS={3:"★★★",2:"★★",1:"★",0:"☆"};

function fp(p){if(p>=10000)return"$"+Math.round(p).toLocaleString("en-US");if(p>=1)return"$"+p.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});return"$"+p.toFixed(6);}
function fpc(p){return(p>=0?"+":"")+p.toFixed(1)+"%";}
function pc(p){return p>0?"#00ffa3":p<0?"#ff4466":"#8a8f98";}
function gc(v){return v<=25?"#ff4466":v<=50?"#ffaa00":v<=75?"#88cc44":"#00ffa3";}
function makeTags(tags,color){var h="";for(var i=0;i<tags.length;i++){h+='<span class="tag" style="background:'+color+'18;color:'+color+';border:1px solid '+color+'30">'+tags[i]+'</span>';}return h;}
function makeCard(title,content,accent,badge){var ac=accent||"#e8e6e3";var bdg=badge?'<div class="bdg">'+badge+'</div>':"";return'<div class="card"><div class="card-hd"><div class="card-title" style="color:'+ac+'">'+title+'</div>'+bdg+'</div>'+content+'</div>';}
function ibox(label,txt){return'<div class="ibox"><div class="ibox-title">💡 '+label+'</div>'+txt+'</div>';}
function cbox(txt){return'<div class="cbox"><div class="cbox-title">⚠ 반대 시나리오</div>'+txt+'</div>';}
function makeTable(headers,rows){var ths="";for(var i=0;i<headers.length;i++){var cls=(i>0&&headers[i]!=="이게 뭔데?")?' class="r"':"";ths+="<th"+cls+">"+headers[i]+"</th>";}var trs="";for(var r=0;r<rows.length;r++){var row=rows[r];var tds="";for(var c=0;c<row.length;c++){var isHint=(headers[c]==="이게 뭔데?");var isRight=(c>0&&!isHint);var cls=isHint?' class="hint"':(isRight?' class="r"':"");tds+="<td"+cls+">"+row[c]+"</td>";}trs+="<tr>"+tds+"</tr>";}return'<div class="tbl-wrap"><table><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table></div>';}

function makeGauge(value,label,streak){
  var color=gc(value);var angle=(value/100)*180-90;var rad=angle*Math.PI/180;
  var x2=(60+36*Math.cos(rad)).toFixed(1);var y2=(58+36*Math.sin(rad)).toFixed(1);
  var dash=((value/100)*157).toFixed(1);
  var streakHtml=streak?'<div class="gauge-str">'+streak+'일 연속</div>':"";
  return'<div class="gauge-wrap"><svg width="120" height="68" viewBox="0 0 120 68"><path d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="#1e2028" stroke-width="8" stroke-linecap="round"/><path d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="'+color+'" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+dash+' 157"/><line x1="60" y1="58" x2="'+x2+'" y2="'+y2+'" stroke="#e8e6e3" stroke-width="2" stroke-linecap="round"/><circle cx="60" cy="58" r="3" fill="#e8e6e3"/></svg><div class="gauge-num" style="color:'+color+'">'+value+'</div><div class="gauge-lbl" style="color:'+color+'">'+label+'</div>'+streakHtml+'</div>';
}

function renderDaily(d){
  var sigMap={};if(d.signals)for(var i=0;i<d.signals.length;i++){sigMap[d.signals[i].symbol]=d.signals[i];}
  // Narrative
  var narrativeHtml=makeCard("오늘의 내러티브",'<div style="margin-bottom:8px">'+makeTags(d.narrative.tags,"#ffaa00")+'</div><div class="narrative">'+d.narrative.summary+'</div><div style="margin-top:8px;padding:8px 12px;background:#0d1117;border-radius:6px;font-size:12px;color:#8a8f98;line-height:1.6">'+d.narrative.context+'</div>',"#ffaa00");
  // Prices
  var pcards="";for(var i=0;i<d.prices.length;i++){var c=d.prices[i];var sig=sigMap[c.symbol];var sigHtml="";
    if(sig){var sc2=sig.signal==="LONG"?"#00ffa3":"#ff4466";var arrow=sig.signal==="LONG"?"▲":"▼";sigHtml='<span class="sig-inline" style="color:'+sc2+'">'+arrow+'</span>';}
    pcards+='<div class="pcard"><div class="pcard-top"><span class="pcard-sym">'+c.symbol+'</span>'+sigHtml+'</div><div class="pcard-price">'+fp(c.price)+'</div><div class="pcard-chg" style="color:'+pc(c.change)+'">'+fpc(c.change)+'</div><div class="pcard-hint">'+c.hint+'</div></div>';}
  // Metrics
  var h=d.metrics;
  var metRows=[["BTC 펀딩비율",'<span style="color:'+(parseFloat(h.funding)<0?"#ff4466":"#00ffa3")+'">'+h.funding+'%</span>',parseFloat(h.funding)<0?"음수=숏 과밀. 숏스퀴즈 가능.":"양수=롱 과밀."],["BTC OI",h.oi,"선물 미결제약정. 변동성 지표."]];
  var gaugeContent='<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">'+makeGauge(h.fng,h.fngLabel,h.fngStreak)+'<div style="flex:1;min-width:160px;font-size:12px;color:#c9cdd4;line-height:1.7">공포탐욕지수 <strong style="color:'+gc(h.fng)+'">'+h.fng+'</strong> — '+h.fngLabel+'</div></div>';
  var metricsHtml=makeCard("시장 지표",makeTable(["지표","값","이게 뭔데?"],metRows),"#e8e6e3","LIVE")+makeCard("공포 & 탐욕",gaugeContent,null,"Sentiment");
  // Watchlist
  var wlHtml="";for(var i=0;i<d.watchlist.length;i++){var w=d.watchlist[i];var sigColor=w.signal==="LONG"?"#00ffa3":w.signal==="SHORT"?"#ff4466":"#8a8f98";wlHtml+='<div class="watchlist-row"><div class="wl-sym">'+w.symbol+'</div><div class="wl-stars">'+w.stars+'</div><div class="wl-signal" style="color:'+sigColor+'">'+w.signal+'</div><div class="wl-reason">'+w.reason+'</div></div>';}
  // Alerts
  var alertsHtml="";if(d.alerts)for(var i=0;i<d.alerts.length;i++){var a=d.alerts[i];alertsHtml+='<div class="alert-row"><span class="tag" style="background:rgba(255,68,102,.1);color:#ff4466;border:1px solid rgba(255,68,102,.18);flex-shrink:0">'+a.target+'</span><div><div class="alert-ev">'+a.event+'</div><div class="alert-rs">'+a.reason+'</div><div class="alert-why">💬 '+(a.why||"")+'</div></div></div>';}
  // Signals
  var signalsHtml="";if(d.signals)for(var i=0;i<d.signals.length;i++){var sig=d.signals[i];var sc3=sig.signal==="LONG"?"#00ffa3":"#ff4466";var factorsHtml='<div class="sig-detail-block">';if(sig.factors)for(var j=0;j<sig.factors.length;j++){factorsHtml+='<div class="sig-detail-row"><div class="sig-factor-lbl">'+sig.factors[j].label+'</div><div class="sig-factor-val">'+sig.factors[j].detail+'</div></div>';}factorsHtml+='</div>';signalsHtml+=makeCard(sig.symbol+" 상세분석",factorsHtml+ibox("종합 해석",sig.interpretation||"")+cbox(sig.counter||""),sc3,STARS[sig.priority]||"☆");}
  // Liq
  var liqHtml="";if(d.liqMap)for(var i=0;i<d.liqMap.length;i++){var l=d.liqMap[i];liqHtml+='<div class="liq-blk"><div class="liq-sym">'+l.symbol+'</div><div class="liq-chips"><span class="chip-long">📉 롱 청산 '+l.longLiq+'</span><span class="chip-short">📈 숏 청산 '+l.shortLiq+'</span></div></div>';}
  // Flow
  var flowHtml="";if(d.netflow)for(var i=0;i<d.netflow.length;i++){var n=d.netflow[i];var fc=n.direction==="유출"?"#00ffa3":"#ff4466";flowHtml+='<div class="flow-row"><div class="flow-top"><span class="flow-sym">'+n.symbol+'</span><span class="flow-amt" style="color:'+fc+'">'+(n.direction==="유출"?"↑ 유출 ":"↓ 유입 ")+n.amount+'</span></div><div class="flow-sub">'+n.meaning+'</div><div class="flow-meaning">'+(n.interpret||"")+'</div></div>';}
  // Structure
  var structHtml="";if(d.structure&&d.structure.length){structHtml='<div class="struct-grid">';for(var i=0;i<d.structure.length;i++){var s=d.structure[i];structHtml+='<div class="struct-item"><div class="struct-lbl">'+s.label+'</div><div class="struct-val">'+s.value+'</div><div class="struct-chg" style="color:'+pc(s.change)+'">'+fpc(s.change)+'</div><div class="struct-hint">'+(s.hint||"")+'</div></div>';}structHtml+='</div>';}
  // Events
  var eventsHtml="";if(d.events)for(var i=0;i<d.events.length;i++){var ev=d.events[i];eventsHtml+='<div class="event-row"><div class="event-date">'+ev.date+'</div><div class="event-name">'+ev.name+'</div><div class="event-impact">'+ev.impact+'</div></div>';}
  // Remember
  var remHtml="";if(d.remember)for(var i=0;i<d.remember.length;i++){var r=d.remember[i];remHtml+='<div class="rem-row"><span class="rem-num">'+(i+1)+'</span><div class="rem-body"><div class="rem-txt">'+r.title+'</div><div class="rem-sub">'+r.sub+'</div></div></div>';}

  var parts=[narrativeHtml,'<div class="pgrid">'+pcards+'</div>',metricsHtml];
  if(d.watchlist.length)parts.push(makeCard("와치리스트",wlHtml,"#e8e6e3","LIVE"));
  if(alertsHtml)parts.push(makeCard("⚠ 이상 감지",alertsHtml,"#ff4466","Alert"));
  if(liqHtml)parts.push(makeCard("청산 지도",liqHtml+ibox("해석",d.liqInterpret||""),"#ff6b35","Liquidation"));
  if(flowHtml)parts.push(makeCard("거래소 자금 흐름",flowHtml+ibox("해석",d.flowInterpret||""),"#4ecdc4","On-chain"));
  if(signalsHtml)parts.push(signalsHtml);
  if(structHtml)parts.push(makeCard("시장 구조 모니터",structHtml+ibox("해석",d.structInterpret||""),"#6c5ce7","구조"));
  if(eventsHtml)parts.push(makeCard("핵심 이벤트",eventsHtml,"#ff6b35","캘린더"));
  if(remHtml)parts.push(makeCard("기억할 것 3가지",remHtml,"#ffaa00"));
  parts.push('<div class="footer">이 리포트는 투자 조언이 아닌 시장 구조 분석입니다.<br>실시간 바이낸스 데이터 기준 · AI 분석은 별도 요청</div>');
  return parts.join("");
}

function render(){
  var el=document.getElementById("main");if(!el)return;
  try{el.innerHTML=currentMode==="daily"?renderDaily(dailyData):renderDaily(dailyData);}
  catch(e){el.innerHTML='<div style="padding:20px;color:#ff4466">렌더링 오류: '+e.message+'</div>';}
}

function switchMode(m){currentMode=m;document.getElementById("tab-daily").className=m==="daily"?"tab on":"tab";document.getElementById("tab-weekly").className=m==="weekly"?"tab on":"tab";render();}
function updateTs(){var el=document.getElementById("ts");if(el)el.textContent=new Date().toLocaleString("ko-KR",{timeZone:"Asia/Seoul"});}

// ═══════════════════════════════════════════════════════════
// AI FULL REPORT (Claude API + web search)
// ═══════════════════════════════════════════════════════════
async function fetchFullReport(){
  var btn=document.getElementById("btnR");btn.disabled=true;btn.textContent="AI 분석 중...";
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:4000,
        system:'You are a Korean crypto market analyst. Return ONLY valid JSON, no markdown. Use web search for real data. Schema: {"date":"YYYY-MM-DD","narrative":{"tags":[],"summary":"","context":""},"prices":[{"symbol":"BTC","price":0,"change":0,"hint":""}],"metrics":{"totalMcap":"","btcD":0,"fng":0,"fngLabel":"","fngStreak":0,"funding":0,"oi":"","oiChange":0,"totalOI":"","totalOIChange":0},"tradfi":[{"label":"","price":"","change":0,"hint":""}],"tradfiInterpret":"","watchlist":[{"symbol":"","stars":"★★★","signal":"LONG","reason":""}],"alerts":[{"target":"","event":"","reason":"","why":""}],"liqMap":[{"symbol":"","longLiq":"","shortLiq":"","longExplain":"","shortExplain":""}],"liqInterpret":"","netflow":[{"symbol":"","direction":"유출","amount":"","meaning":"","interpret":""}],"flowInterpret":"","signals":[{"symbol":"","signal":"LONG","priority":3,"factors":[{"label":"","detail":""}],"interpretation":"","counter":""}],"structure":[{"label":"","value":"","change":0,"hint":""}],"structInterpret":"","events":[{"date":"","name":"","impact":""}],"remember":[{"title":"","sub":""}]}',
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:"Search for today's crypto market data and return complete Korean daily report JSON."}]
      })
    });
    var data=await res.json();
    var textBlock=null;
    if(data.content)for(var i=0;i<data.content.length;i++){if(data.content[i].type==="text"){textBlock=data.content[i];break;}}
    if(textBlock&&textBlock.text){
      var clean=textBlock.text.replace(/```json/g,"").replace(/```/g,"").trim();
      var parsed=JSON.parse(clean);
      dailyData=parsed;
      updateTs();render();
      log("AI 분석 완료",true);
    }
  }catch(e){console.error(e);log("AI 분석 실패: "+e.message,false);}
  btn.disabled=false;btn.textContent="🔄 AI 분석";
}

// ═══════════════════════════════════════════════════════════
// INIT: fetch real data immediately
// ═══════════════════════════════════════════════════════════
async function init(){
  updateTs();
  await Promise.all([fetchPrices(),fetchFunding(),fetchOI(),fetchFNG()]);
  dailyData=buildDailyFromLive();
  render();
  // Auto-refresh prices every 30s
  setInterval(async function(){
    await fetchPrices();
    await fetchFunding();
    dailyData=buildDailyFromLive();
    updateTs();render();
  },30000);
}
init();
</script>
